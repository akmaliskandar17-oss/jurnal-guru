                            <button onClick={() => window.print()} disabled={!filterKelas} className="px-4 py-2 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 font-semibold text-xs transition flex items-center space-x-1.5 disabled:opacity-50">
                                <IconPrint/> <span>Cetak Laporan</span>
                            </button>
                        </div>
                    </div>

                    <div className="p-6 md:p-8 print:p-0">
                        {/* Kop Cetak Laporan Kepala Sekolah */}
                        <div className="hidden print-block text-center border-b-2 border-slate-900 pb-5 mb-8">
                            <h1 className="text-xl font-bold uppercase text-slate-900 leading-tight">PEMERINTAH PROVINSI SULAWESI SELATAN</h1>
                            <h2 className="text-lg font-black uppercase text-slate-900 mt-1">SMK NEGERI 3 SELAYAR</h2>
                            <p className="text-xs text-slate-500 mt-1">Laporan Rekapitulasi {activeTab === 'kehadiran' ? 'Kehadiran Siswa' : 'Kegiatan Belajar Mengajar'}</p>
                            <p className="text-[11px] text-slate-800 mt-1 font-semibold">Kelas: {filterKelas} | Bulan: {filterBulan}</p>
                            <div className="w-full h-1 bg-slate-900 mt-3"></div>
                        </div>

                        {filterKelas ? (
                            activeTab === 'kehadiran' ? (
                                <div className="overflow-x-auto print:overflow-visible">
                                    <table className="w-full text-xs border-collapse border border-slate-300">
                                        <thead>
                                            <tr className="bg-slate-100 text-slate-800 font-semibold">
                                                <th className="border border-slate-300 p-2.5 text-center w-10" rowSpan="2">No</th>
                                                <th className="border border-slate-300 p-2.5 text-left min-w-[200px]" rowSpan="2">Nama Lengkap Siswa</th>
                                                <th className="border border-slate-300 p-2.5 text-center" colSpan={Math.max(attendanceRecap.dates.length, 1)}>Tanggal Pertemuan</th>
                                                <th className="border border-slate-300 p-2.5 text-center" colSpan="4">Akumulasi</th>
                                            </tr>
                                            <tr className="bg-slate-100 text-slate-800 font-semibold">
                                                {attendanceRecap.dates.length > 0 ? attendanceRecap.dates.map((d, i) => (
                                                    <th key={i} className="border border-slate-300 p-1.5 text-center min-w-[30px] bg-indigo-50/50" title={`Id Jurnal: ${d.id}`}>{d.date}</th>
                                                )) : <th className="border border-slate-300 p-1.5 text-center text-slate-400 italic">Belum ada KBM</th>}
                                                
                                                <th className="border border-slate-300 p-1.5 text-center text-emerald-700 bg-emerald-50 w-8">H</th>
                                                <th className="border border-slate-300 p-1.5 text-center text-amber-600 bg-amber-50 w-8">S</th>
                                                <th className="border border-slate-300 p-1.5 text-center text-blue-700 bg-blue-50 w-8">I</th>
                                                <th className="border border-slate-300 p-1.5 text-center text-rose-700 bg-rose-50 w-8">A</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {attendanceRecap.studentData.map((s, idx) => (
                                                <tr key={s.id} className="hover:bg-slate-50/50 transition print-break-inside-avoid">
                                                    <td className="border border-slate-300 p-2.5 text-center">{idx + 1}</td>
                                                    <td className="border border-slate-300 p-2.5 font-semibold text-slate-800">
                                                        {s.nama}
                                                        <span className="print-hidden text-[9px] text-slate-400 font-mono ml-2 font-normal">({s.nis})</span>
                                                    </td>
                                                    
                                                    {attendanceRecap.dates.length > 0 ? s.absensiArr.map((status, i) => (
                                                        <td key={i} className={`border border-slate-300 p-2.5 text-center font-bold 
                                                            ${status === 'H' ? 'text-emerald-600' : ''}
                                                            ${status === 'S' ? 'text-amber-500' : ''}
                                                            ${status === 'I' ? 'text-blue-600' : ''}
                                                            ${status === 'A' ? 'text-rose-600' : ''}
                                                        `}>{status}</td>
                                                    )) : <td className="border border-slate-300 p-2.5 text-center bg-slate-50 text-slate-400">-</td>}

                                                    <td className="border border-slate-300 p-2 text-center font-extrabold bg-emerald-50/30 text-emerald-600">{s.totalH}</td>
                                                    <td className="border border-slate-300 p-2 text-center font-extrabold bg-amber-50/30 text-amber-500">{s.totalS}</td>
                                                    <td className="border border-slate-300 p-2 text-center font-extrabold bg-blue-50/30 text-blue-600">{s.totalI}</td>
                                                    <td className="border border-slate-300 p-2 text-center font-extrabold bg-rose-50/30 text-rose-600">{s.totalA}</td>
                                                </tr>
                                            ))}
                                            {attendanceRecap.studentData.length === 0 && (
                                                <tr>
                                                    <td colSpan={6 + attendanceRecap.dates.length} className="border border-slate-300 p-6 text-center text-slate-400 bg-slate-50">
                                                        Belum ada data siswa untuk kelas ini.
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            ) : (
                                <div className="overflow-x-auto print:overflow-visible">
                                    <table className="w-full text-xs border-collapse border border-slate-300">
                                        <thead className="bg-slate-100 text-slate-800 font-semibold">
                                            <tr>
                                                <th className="border border-slate-300 p-3 text-center w-12">No</th>
                                                <th className="border border-slate-300 p-3 text-left w-28">Tanggal</th>
                                                <th className="border border-slate-300 p-3 text-left w-48">Mata Pelajaran</th>
                                                <th className="border border-slate-300 p-3 text-left">Materi Pembahasan KBM</th>
                                                <th className="border border-slate-300 p-3 text-left">Hambatan / Catatan Guru</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {journalsRecap.map((j, idx) => (
                                                <tr key={j.id} className="hover:bg-slate-50/50 print-break-inside-avoid">
                                                    <td className="border border-slate-300 p-3 text-center align-top text-slate-400">{idx + 1}</td>
                                                    <td className="border border-slate-300 p-3 font-semibold text-slate-800 align-top whitespace-nowrap">{j.tanggal}</td>
                                                    <td className="border border-slate-300 p-3 font-medium text-slate-700 align-top">{j.mapel}</td>
                                                    <td className="border border-slate-300 p-3 text-slate-800 align-top">{j.materi}</td>
                                                    <td className="border border-slate-300 p-3 text-slate-500 align-top whitespace-pre-wrap">{j.catatan || '-'}</td>
                                                </tr>
                                            ))}
                                            {journalsRecap.length === 0 && (
                                                <tr>
                                                    <td colSpan="5" className="border border-slate-300 p-8 text-center text-slate-400 bg-slate-50">
                                                        Belum ada log jurnal mengajar pada rombel ini.
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            )
                        ) : (
                            <div className="p-12 text-center text-slate-400 print-hidden bg-slate-50 rounded-2xl border border-dashed">
                                Tidak ada kelas yang terpilih.
                            </div>
                        )}
                        
                        {/* Lembar Tanda Tangan Cetak Laporan Laporan Formal */}
                        <div className="hidden print:flex justify-between mt-20 pt-8">
                            <div className="text-center w-48">
                                <p className="text-xs text-slate-500">Mengetahui,</p>
                                <p className="text-xs font-semibold text-slate-800">Kepala Sekolah</p>
                                <div className="h-20"></div>
                                <p className="font-bold text-slate-900 underline">Drs. H. Ahmad Yani, M.Pd.</p>
                                <p className="text-[10px] text-slate-400 mt-1">NIP. 19700101</p>
                            </div>
                            <div className="text-center w-48">
                                <p className="text-xs text-slate-500">Menyatakan Sebenarnya,</p>
                                <p className="text-xs font-semibold text-slate-800">Guru Pengajar / Piket</p>
                                <div className="h-20"></div>
                                <p className="font-bold text-slate-900 underline">_______________________</p>
                                <p className="text-[10px] text-slate-400 mt-1">NIP. </p>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
