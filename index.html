                try {
                    if (safeStorage.isSupported()) {
                        return window.localStorage.getItem(key);
                    }
                } catch (e) {}
                return safeStorage._memoryStore[key] || null;
            },
            setItem: (key, value) => {
                try {
                    if (safeStorage.isSupported()) {
                        window.localStorage.setItem(key, value);
                        return;
                    }
                } catch (e) {}
                safeStorage._memoryStore[key] = String(value);
            },
            removeItem: (key) => {
                try {
                    if (safeStorage.isSupported()) {
                        window.localStorage.removeItem(key);
                        return;
                    }
                } catch (e) {}

        const ViewLogin = ({ onLoginSuccess, firebaseActive, triggerAlert }) => {
            const [nip, setNip] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const [activeRoleTab, setActiveRoleTab] = useState('guru'); // guru atau kepsek

            const handleLogin = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);

                // Buang spasi tak terlihat di ujung input
                const cleanNip = nip.trim();
                const cleanPassword = password.trim();

                try {
                    if (!firebaseActive) {
                        // Login dengan engine safeStorage / Pratinjau
                        const localUsers = JSON.parse(safeStorage.getItem('jurnal_gurus')) || DUMMY_USERS;
                        const match = localUsers.find(g => g.nip === cleanNip && g.password === cleanPassword && g.role === activeRoleTab);
                        if (match) {
                            onLoginSuccess(match);
                        } else {
                            setError(`NIP atau password untuk peran ${activeRoleTab === 'guru' ? 'Guru' : 'Kepala Sekolah'} salah!`);
                        }
                    } else {
                        // Login secara Live via Cloud Firestore
                        const { getFirestore, collection, query, where, getDocs } = window.firebaseFirestoreSDK;
                        const db = window.activeDb;
                        const q = query(
                            collection(db, "gurus"), 
                            where("nip", "==", cleanNip), 
                            where("password", "==", cleanPassword),
                            where("role", "==", activeRoleTab)
                        );
                        const querySnapshot = await getDocs(q);
                        
                        if (!querySnapshot.empty) {
                            const docData = querySnapshot.docs[0];
                            onLoginSuccess({ id: docData.id, ...docData.data() });
                        } else {
                            setError(`Data login ${activeRoleTab === 'guru' ? 'Guru' : 'Kepala Sekolah'} tidak terdaftar di database cloud!`);
                        }
                    }
                } catch (err) {
                    console.error(err);
                    setError('Koneksi database gagal atau terjadi pembatasan browser.');
                } finally {
                    setLoading(false);
                }

            return (

                            </div>

                            <p className="text-slate-300 text-xs mt-1">SMKN 3 Selayar &amp; Sekolah Terintegrasi</p>
                        </div>

                                <span className={`w-1.5 h-1.5 rounded-full mr-1.5 ${firebaseActive ? 'bg-emerald-400 animate-pulse' : 'bg-amber-400'}`}></span>

                        </div>

                            </button>

                                onClick={() => { setActiveRoleTab('kepsek'); setError(''); }}

            const [confirmState, setConfirmState] = useState({ isOpen: false, title: '', message: '', onConfirm: null });

                    isOpen: true,
                    title,
                    message,
                    onConfirm: () => {
                        callback();

                const savedUser = safeStorage.getItem('jurnal_active_user');

                        setLoggedInUser(JSON.parse(savedUser));
                    } catch (e) {
                        safeStorage.removeItem('jurnal_active_user');
                    }
                }
            }, []);

            // Setup Cloud Firebase or Local Storage Database
            useEffect(() => {
                let checkAttempts = 0;
                const checkFirebaseLib = setInterval(() => {
                    checkAttempts++;
                    const hasCredentials = firebaseConfig.apiKey !== "API_KEY_ANDA" && !IS_PREVIEW;

                    if (window.firebaseInitialized && hasCredentials) {
                        clearInterval(checkFirebaseLib);
                        setupFirebaseConnection();
                    } else if (checkAttempts > 8 || !hasCredentials) {
                        clearInterval(checkFirebaseLib);
                        setupLocalStorageConnection();
                    }
                }, 150);
            }, []);

            const setupFirebaseConnection = async () => {
                try {
                    const { initializeApp } = window.firebaseCore;
                    const { getAuth, signInAnonymously } = window.firebaseAuthSDK;
                    const { getFirestore, collection, onSnapshot } = window.firebaseFirestoreSDK;

                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    const db = getFirestore(app);

                    await signInAnonymously(auth);

                    setFirebaseActive(true);
                    window.activeDb = db;

                    // Stream Live Firestore Data Siswa
                    const studentsRef = collection(db, "students");
                    onSnapshot(studentsRef, (snapshot) => {
                        if (snapshot.empty) {
                            autoSetupDatabase(db);
                        } else {
                            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            data.sort((a, b) => a.kelas.localeCompare(b.kelas) || a.nama.localeCompare(b.nama));
                            setStudents(data);
                        }
                    });

                    // Stream Live Firestore Data Jurnal
                    const journalsRef = collection(db, "journals");
                    onSnapshot(journalsRef, (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        data.sort((a, b) => b.tanggal.localeCompare(a.tanggal));
                        setJournals(data);
                    });

                    setLoading(false);
                } catch (error) {
                    console.error("Firebase Gagal. Berpindah ke Simulasi safeStorage.", error);
                    setupLocalStorageConnection();
                }
            };

            const setupLocalStorageConnection = () => {
                setFirebaseActive(false);
                
                if (!safeStorage.getItem('jurnal_students')) {
                    safeStorage.setItem('jurnal_students', JSON.stringify(DUMMY_STUDENTS));
                }
                if (!safeStorage.getItem('jurnal_journals')) {
                    safeStorage.setItem('jurnal_journals', JSON.stringify(DUMMY_JOURNALS));
                }
                if (!safeStorage.getItem('jurnal_gurus')) {
                    safeStorage.setItem('jurnal_gurus', JSON.stringify(DUMMY_USERS));
                }

                const localStuds = JSON.parse(safeStorage.getItem('jurnal_students'));
                const localJourns = JSON.parse(safeStorage.getItem('jurnal_journals'));

                localStuds.sort((a, b) => a.kelas.localeCompare(b.kelas) || a.nama.localeCompare(b.nama));
                localJourns.sort((a, b) => b.tanggal.localeCompare(a.tanggal));

                setStudents(localStuds);
                setJournals(localJourns);
                setLoading(false);
            };

            const autoSetupDatabase = async (db) => {
                const { collection, addDoc } = window.firebaseFirestoreSDK;
                const studentsRef = collection(db, "students");
                const journalsRef = collection(db, "journals");
                const gurusRef = collection(db, "gurus");

                for (const student of DUMMY_STUDENTS) {
                    await addDoc(studentsRef, {
                        nis: student.nis,
                        nama: student.nama,
                        kelas: student.kelas
                    });
                }
                for (const jrn of DUMMY_JOURNALS) {
                    await addDoc(journalsRef, {
                        tanggal: jrn.tanggal,
                        kelas: jrn.kelas,
                        mapel: jrn.mapel,
                        materi: jrn.materi,
                        catatan: jrn.catatan,
                        fotoUrl: jrn.fotoUrl,
                        waktu_input: jrn.waktu_input,
                        guru_nama: jrn.guru_nama,
                        guru_nip: jrn.guru_nip,
                        absensi_data: jrn.absensi_data,
                        rekap: jrn.rekap
                    });
                }
                for (const gr of DUMMY_USERS) {
                    await addDoc(gurusRef, {
                        nip: gr.nip,
                        nama: gr.nama,
                        password: gr.password,
                        role: gr.role,
                        mapel: gr.mapel
                    });
                }
            };

            const handleLoginSuccess = (userData) => {
                setLoggedInUser(userData);
                safeStorage.setItem('jurnal_active_user', JSON.stringify(userData));
                setCurrentView('dashboard');
            };

            const handleLogout = () => {
                triggerConfirm(
                    "Keluar Aplikasi",
                    "Apakah Anda yakin ingin mengakhiri sesi dan keluar dari sistem Jurnal?",
                    () => {
                        setLoggedInUser(null);
                        safeStorage.removeItem('jurnal_active_user');
                    }
                );
            };

            const addStudent = async (newStudent) => {
                if (firebaseActive) {
                    const { collection, addDoc } = window.firebaseFirestoreSDK;
                    await addDoc(collection(window.activeDb, "students"), newStudent);
                } else {
                    const updated = [...students, { id: 'local_' + Date.now(), ...newStudent }];
                    updated.sort((a, b) => a.kelas.localeCompare(b.kelas) || a.nama.localeCompare(b.nama));
                    safeStorage.setItem('jurnal_students', JSON.stringify(updated));
                    setStudents(updated);
                }
            };

            const deleteStudent = async (id) => {
                triggerConfirm(
                    "Hapus Siswa",
                    "Apakah Anda yakin ingin menghapus siswa ini secara permanen dari daftar kelas?",
                    async () => {
                        if (firebaseActive) {
                            const { doc, deleteDoc } = window.firebaseFirestoreSDK;
                            await deleteDoc(doc(window.activeDb, "students", id));
                        } else {
                            const updated = students.filter(s => s.id !== id);
                            safeStorage.setItem('jurnal_students', JSON.stringify(updated));
                            setStudents(updated);
                        }
                    }
                );
            };

            const addJournal = async (newJournal) => {
                const journalPayload = {
                    ...newJournal,
                    guru_nama: loggedInUser.nama,
                    guru_nip: loggedInUser.nip
                };

                if (firebaseActive) {
                    const { collection, addDoc } = window.firebaseFirestoreSDK;
                    await addDoc(collection(window.activeDb, "journals"), journalPayload);
                } else {
                    const updated = [{ id: 'j_local_' + Date.now(), ...journalPayload }, ...journals];
                    updated.sort((a, b) => b.tanggal.localeCompare(a.tanggal));
                    safeStorage.setItem('jurnal_journals', JSON.stringify(updated));
                    setJournals(updated);
                }
            };

            const deleteJournal = async (id) => {
                triggerConfirm(
                    "Hapus Jurnal Mengajar",
                    "Apakah Anda yakin ingin menghapus data jurnal ini secara permanen?",
                    async () => {
                        if (firebaseActive) {
                            const { doc, deleteDoc } = window.firebaseFirestoreSDK;
                            await deleteDoc(doc(window.activeDb, "journals", id));
                        } else {
                            const updated = journals.filter(j => j.id !== id);
                            safeStorage.setItem('jurnal_journals', JSON.stringify(updated));
                            setJournals(updated);
                        }
                    }
                );
            };

            if (loading) {
                return (
                    <div className="flex flex-col h-screen items-center justify-center bg-slate-900 text-white space-y-4">
                        <div className="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                        <p className="text-lg font-semibold tracking-wider">Menyiapkan Aplikasi Jurnal...</p>
                        <p className="text-xs text-slate-400">Menyinkronkan database sekolah secara aman</p>
                    </div>
                );
            }

            if (!loggedInUser) {
                return <ViewLogin onLoginSuccess={handleLoginSuccess} firebaseActive={firebaseActive} triggerAlert={triggerAlert} />;
            }

            const isKepsek = loggedInUser.role === 'kepsek';

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* CUSTOM MODAL SYSTEM (Bebas dari block browser) */}
                    <CustomConfirmModal 
                        isOpen={confirmState.isOpen}
                        title={confirmState.title}
                        message={confirmState.message}
                        onConfirm={confirmState.onConfirm}
                        onCancel={() => setConfirmState({ isOpen: false, title: '', message: '', onConfirm: null })}
                    />

                    <CustomAlertModal 
                        isOpen={alertState.isOpen}
                        title={alertState.title}
                        message={alertState.message}
                        onClose={() => setAlertState({ isOpen: false, title: '', message: '' })}
                    />

                    {/* Sidebar navigasi kiri desktop */}
                    <aside className="hidden md:flex w-72 bg-slate-900 text-white flex-col shadow-2xl print-hidden flex-shrink-0 z-30">
                        <div className="p-8 border-b border-indigo-950 flex items-center space-x-3">
                            <div className="p-2.5 bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-600/30">
                                <IconBook />
                            </div>
                            <div>
                                <h1 className="text-lg font-black tracking-tight leading-none text-white">E-JURNAL</h1>
                                <span className="text-indigo-400 text-[10px] font-semibold tracking-widest uppercase">{isKepsek ? 'KEPALA SEKOLAH' : 'GURU TERPADU'}</span>
                            </div>
                        </div>

                        <div className="px-8 mt-4">
                            <div className={`text-[10px] uppercase font-bold py-1.5 px-3 rounded-full flex items-center space-x-2 w-fit ${firebaseActive ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-amber-500/10 text-amber-400 border border-amber-500/20'}`}>
                                <span className={`w-2 h-2 rounded-full ${firebaseActive ? 'bg-emerald-400 animate-pulse' : 'bg-amber-400'}`}></span>
                                <span>{firebaseActive ? 'Firebase Server' : 'Mode Simulasi'}</span>
                            </div>
                        </div>

                        {/* Menu Navigasi Sesuai Role */}
                        <nav className="flex-1 px-4 py-8 space-y-1.5 overflow-y-auto">
                            {isKepsek ? (
                                // MENU KEPALA SEKOLAH (Fokus Monitoring)
                                <>
                                    <MenuButton icon={<IconDashboard />} label="Dashboard Kepsek" isActive={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
                                    <MenuButton icon={<IconHistory />} label="Monitoring Jurnal" isActive={currentView === 'monitoring_jurnal'} onClick={() => setCurrentView('monitoring_jurnal')} />
                                    <MenuButton icon={<IconChart />} label="Rekap &amp; Laporan" isActive={currentView === 'rekap'} onClick={() => setCurrentView('rekap')} />
                                </>
                            ) : (
                                // MENU GURU (Fokus Input & Management)
                                <>
                                    <MenuButton icon={<IconDashboard />} label="Dashboard" isActive={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
                                    <MenuButton icon={<IconUsers />} label="Data Siswa" isActive={currentView === 'siswa'} onClick={() => setCurrentView('siswa')} />
                                    <MenuButton icon={<IconBook />} label="Isi Jurnal &amp; Absen" isActive={currentView === 'isi_jurnal'} onClick={() => setCurrentView('isi_jurnal')} />
                                    <MenuButton icon={<IconHistory />} label="Riwayat Jurnal" isActive={currentView === 'riwayat'} onClick={() => setCurrentView('riwayat')} />
                                    <MenuButton icon={<IconChart />} label="Rekap" isActive={currentView === 'rekap'} onClick={() => setCurrentView('rekap')} />
                                </>
                            )}
                        </nav>

                        {/* Profil Akun & Sesi Keluar */}
                        <div className="p-6 border-t border-indigo-950/80 bg-slate-950/40">
                            <div className="flex items-center space-x-3 mb-4">
                                <div className="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center font-bold text-white uppercase shadow-lg">
                                    {loggedInUser.nama.charAt(0)}
                                </div>
                                <div className="flex-1 overflow-hidden">
                                    <p className="text-sm font-semibold truncate text-white leading-tight">{loggedInUser.nama}</p>
                                    <p className="text-[10px] text-slate-400 font-mono mt-0.5">NIP. {loggedInUser.nip}</p>
                                </div>
                            </div>
                            <button 
                                onClick={handleLogout}
                                className="w-full bg-rose-500/10 hover:bg-rose-500 hover:text-white border border-rose-500/20 text-rose-400 text-xs font-bold py-2.5 rounded-xl transition flex items-center justify-center space-x-2"
                            >
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                                <span>Keluar Sistem</span>
                            </button>
                        </div>
                    </aside>

                    {/* Navigasi Mobile (Bawah Layar) */}
                    <nav className="md:hidden fixed bottom-4 left-4 right-4 bg-slate-900/95 backdrop-blur-md rounded-2xl p-2.5 flex items-center justify-around shadow-2xl print-hidden z-40 border border-white/10">
                        {isKepsek ? (
                            <>
                                <MobileTabButton icon={<IconDashboard />} isActive={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
                                <MobileTabButton icon={<IconHistory />} isActive={currentView === 'monitoring_jurnal'} onClick={() => setCurrentView('monitoring_jurnal')} />
                                <MobileTabButton icon={<IconChart />} isActive={currentView === 'rekap'} onClick={() => setCurrentView('rekap')} />
                            </>
                        ) : (
                            <>
                                <MobileTabButton icon={<IconDashboard />} isActive={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
                                <MobileTabButton icon={<IconUsers />} isActive={currentView === 'siswa'} onClick={() => setCurrentView('siswa')} />
                                <MobileTabButton icon={<IconBook />} isActive={currentView === 'isi_jurnal'} onClick={() => setCurrentView('isi_jurnal')} />
                                <MobileTabButton icon={<IconHistory />} isActive={currentView === 'riwayat'} onClick={() => setCurrentView('riwayat')} />
                                <MobileTabButton icon={<IconChart />} isActive={currentView === 'rekap'} onClick={() => setCurrentView('rekap')} />
                            </>
                        )}
                        <button onClick={handleLogout} className="p-3 rounded-xl text-rose-400">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                        </button>
                    </nav>

                    {/* Area Ruang Kerja Utama */}
                    <main className="flex-1 flex flex-col h-screen overflow-y-auto print-block relative bg-slate-50">
                        <header className="bg-white/85 backdrop-blur-md shadow-sm border-b border-slate-100 px-8 py-5 flex items-center justify-between print-hidden sticky top-0 z-20">
                            <h2 className="text-xl font-bold text-slate-800 capitalize tracking-tight flex items-center space-x-2">
                                <span className="text-indigo-600">|</span>
                                <span>{currentView.replace('_', ' ')}</span>
                            </h2>
                            <div className="flex items-center space-x-3 text-sm font-semibold text-slate-600 bg-slate-100/60 py-1.5 px-4 rounded-full border border-slate-200/50">
                                <div className="w-2.5 h-2.5 rounded-full bg-indigo-600 animate-pulse"></div>
                                <span>{loggedInUser.mapel}</span>
                            </div>
                        </header>

                        <div className="p-4 md:p-8 flex-1 pb-24 md:pb-8">
                            {isKepsek ? (
                                // ROUTING TAMPILAN KEPALA SEKOLAH
                                <>
                                    {currentView === 'dashboard' && <ViewDashboardKepsek journals={journals} students={students} changeView={setCurrentView} />}
                                    {currentView === 'monitoring_jurnal' && <ViewMonitoringJurnal journals={journals} deleteJournal={deleteJournal} />}
                                    {currentView === 'rekap' && <ViewRekap journals={journals} students={students} loggedInUser={loggedInUser} />}
                                </>
                            ) : (
                                // ROUTING TAMPILAN GURU
                                <>
                                    {currentView === 'dashboard' && <ViewDashboard journals={journals} students={students} changeView={setCurrentView} />}
                                    {currentView === 'siswa' && <ViewDataSiswa students={students} addStudent={addStudent} deleteStudent={deleteStudent} />}
                                    {currentView === 'isi_jurnal' && <ViewIsiJurnal students={students} addJournal={addJournal} onSuccess={() => setCurrentView('riwayat')} triggerAlert={triggerAlert} />}
                                    {currentView === 'riwayat' && <ViewRiwayat journals={journals} deleteJournal={deleteJournal} />}
                                    {currentView === 'rekap' && <ViewRekap journals={journals} students={students} loggedInUser={loggedInUser} />}
                                </>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const MenuButton = ({ icon, label, isActive, onClick }) => (
            <button 
                onClick={onClick}
                className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 ${
                    isActive 
                        ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/25 font-semibold translate-x-1' 
                        : 'text-indigo-200/80 hover:bg-slate-800 hover:text-white hover:translate-x-1'
                }`}
            >
                <span className={isActive ? 'text-white' : 'text-indigo-400'}>{icon}</span>
                <span className="text-sm tracking-wide">{label}</span>
            </button>
        );

        const MobileTabButton = ({ icon, isActive, onClick }) => (
            <button 
                onClick={onClick} 
                className={`p-3 rounded-xl transition-all duration-200 ${
                    isActive ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/30' : 'text-indigo-300 hover:text-white'
                }`}
            >
                {icon}
            </button>
        );

        const ViewDashboard = ({ journals, students, changeView }) => {
            const today = new Date().toISOString().split('T')[0];
            const journalsToday = journals.filter(j => j.tanggal === today).length;
            const classesCount = new Set(students.map(s => s.kelas)).size;

            return (
                <div className="space-y-8">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        <StatCard title="Total Siswa Terdaftar" value={students.length} color="indigo" icon={<IconUsers/>} onClick={() => changeView('siswa')} />
                        <StatCard title="Total Rombel / Kelas" value={classesCount} color="sky" icon={<IconBook/>} onClick={() => changeView('siswa')} />
                        <StatCard title="Jurnal Terisi Hari Ini" value={journalsToday} color="emerald" icon={<IconHistory/>} onClick={() => changeView('riwayat')} />
                    </div>

                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col">
                        <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-6 pb-4 border-b border-slate-100">
                            <div>
                                <h3 className="text-lg font-bold text-slate-900">Aktivitas Mengajar Terkini</h3>
                                <p className="text-slate-500 text-xs">Menampilkan 5 entri jurnal mengajar terakhir</p>
                            </div>
                            <button onClick={() => changeView('riwayat')} className="mt-3 sm:mt-0 text-sm font-semibold text-indigo-600 hover:text-indigo-800 transition">
                                Lihat Semua Jurnal &rarr;
                            </button>
                        </div>

                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse text-sm">
                                <thead>
                                    <tr className="bg-slate-50/75 text-slate-500 font-semibold border-b border-slate-100">
                                        <th className="p-4">Tanggal KBM</th>
                                        <th className="p-4">Kelas</th>
                                        <th className="p-4">Mata Pelajaran</th>
                                        <th className="p-4">Pokok Materi &amp; Pembahasan</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {journals.slice(0, 5).map((j, i) => (
                                        <tr key={i} className="hover:bg-slate-50/50 transition">
                                            <td className="p-4 font-medium text-slate-800">{j.tanggal}</td>
                                            <td className="p-4"><span className="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-indigo-50 text-indigo-700">{j.kelas}</span></td>
                                            <td className="p-4 text-slate-600 font-medium">{j.mapel}</td>
                                            <td className="p-4 text-slate-500 max-w-xs truncate">{j.materi}</td>
                                        </tr>
                                    ))}
                                    {journals.length === 0 && (
                                        <tr>
                                            <td colSpan="4" className="p-12 text-center text-slate-400">
                                                <div className="flex flex-col items-center justify-center space-y-2">
                                                    <IconBook />
                                                    <p className="font-semibold text-sm">Belum ada jurnal KBM</p>
                                                    <p className="text-xs">Klik menu "Isi Jurnal &amp; Absen" di bilah menu samping.</p>
                                                </div>
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const ViewDashboardKepsek = ({ journals, students, changeView }) => {
            const today = new Date().toISOString().split('T')[0];
            const journalsToday = journals.filter(j => j.tanggal === today).length;
            const uniqueTeachers = new Set(journals.map(j => j.guru_nama)).size;
            const classesCount = new Set(students.map(s => s.kelas)).size;

            return (
                <div className="space-y-8">
                    {/* Stat Cards Kepala Sekolah */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <StatCard title="Total Guru Aktif" value={uniqueTeachers || 0} color="indigo" icon={<IconUsers/>} onClick={() => changeView('monitoring_jurnal')} />
                        <StatCard title="Total Siswa" value={students.length} color="sky" icon={<IconUsers/>} onClick={() => {}} />
                        <StatCard title="Jumlah Kelas" value={classesCount} color="indigo" icon={<IconBook/>} onClick={() => {}} />
                        <StatCard title="KBM Hari Ini" value={journalsToday} color="emerald" icon={<IconHistory/>} onClick={() => changeView('monitoring_jurnal')} />
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* Status Absensi Kelas Terkini */}
                        <div className="lg:col-span-2 bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col">
                            <div className="flex items-center justify-between mb-6 pb-4 border-b border-slate-100">
                                <div>
                                    <h3 className="text-lg font-bold text-slate-900">Log Aktivitas Guru Terbaru</h3>
                                    <p className="text-slate-500 text-xs">Pemantauan kegiatan belajar mengajar real-time</p>
                                </div>
                                <button onClick={() => changeView('monitoring_jurnal')} className="text-sm font-semibold text-indigo-600 hover:text-indigo-800">
                                    Pantau Semua &rarr;
                                </button>
                            </div>

                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse text-sm">
                                    <thead>
                                        <tr className="bg-slate-50/75 text-slate-500 font-semibold border-b border-slate-100">
                                            <th className="p-4">Guru</th>
                                            <th className="p-4">Tanggal</th>
                                            <th className="p-4">Kelas</th>
                                            <th className="p-4">Materi</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {journals.slice(0, 5).map((j, i) => (
                                            <tr key={i} className="hover:bg-slate-50/50 transition">
                                                <td className="p-4 font-semibold text-slate-800">{j.guru_nama}</td>
                                                <td className="p-4 text-slate-500">{j.tanggal}</td>
                                                <td className="p-4"><span className="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-indigo-50 text-indigo-700">{j.kelas}</span></td>
                                                <td className="p-4 text-slate-500 truncate max-w-[150px]">{j.materi}</td>
                                            </tr>
                                        ))}
                                        {journals.length === 0 && (
                                            <tr>
                                                <td colSpan="4" className="p-12 text-center text-slate-400">Belum ada aktivitas guru yang terekam hari ini.</td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* Ringkasan Kehadiran Rerata */}
                        <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col">
                            <h3 className="text-lg font-bold text-slate-900 mb-6 border-b border-slate-100 pb-4">Persentase KBM</h3>
                            <div className="flex-1 flex flex-col items-center justify-center text-center space-y-4">
                                <div className="relative w-36 h-36 flex items-center justify-center">
                                    <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                                        <path className="text-slate-100" strokeWidth="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                        <path className="text-indigo-600" strokeDasharray="85, 100" strokeWidth="3" strokeLinecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                    </svg>
                                    <div className="absolute text-center">
                                        <p className="text-3xl font-black text-slate-900">85%</p>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Kehadiran</p>
                                    </div>
                                </div>
                                <p className="text-xs text-slate-500 leading-relaxed px-4">Rata-rata persentase kehadiran murid di seluruh kelas bulan ini mencapai 85%.</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const StatCard = ({ title, value, color, icon, onClick }) => {
            const colors = {
                indigo: 'bg-indigo-600 shadow-indigo-600/20 text-indigo-600',
                sky: 'bg-sky-500 shadow-sky-500/20 text-sky-500',
                emerald: 'bg-emerald-500 shadow-emerald-500/20 text-emerald-500'
            };
            return (
                <div onClick={onClick} className="bg-white rounded-3xl shadow-sm border border-slate-100 p-6 flex items-center space-x-5 cursor-pointer hover:shadow-md transition duration-200">
                    <div className={`p-4 rounded-2xl bg-slate-50 ${colors[color] || 'bg-slate-50 text-slate-700'}`}>
                        {icon}
                    </div>
                    <div>
                        <p className="text-xs font-semibold tracking-wider text-slate-400 uppercase">{title}</p>
                        <p className="text-3xl font-extrabold text-slate-800 mt-1">{value}</p>
                    </div>
                </div>
            );
        };

        const ViewDataSiswa = ({ students, addStudent, deleteStudent }) => {
            const [nama, setNama] = useState('');
            const [nis, setNis] = useState('');
            const [kelas, setKelas] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);

            const handleAdd = async (e) => {
                e.preventDefault();
                if(!nama || !nis || !kelas) return;
                setIsSubmitting(true);
                try {
                    await addStudent({
                        nama, 
                        nis, 
                        kelas: kelas.trim().toUpperCase()
                    });
                    setNama(''); 
                    setNis('');
                } catch (error) {
                    console.error(error);
                }
                setIsSubmitting(false);
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    {/* Panel Tambah Siswa */}
                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 h-fit">
                        <h3 className="text-lg font-bold text-slate-900 mb-6 border-b border-slate-100 pb-3 flex items-center space-x-2">
                            <span className="text-indigo-600 text-xl font-bold">+</span>
                            <span>Tambah Siswa Baru</span>
                        </h3>
                        <form onSubmit={handleAdd} className="space-y-5">
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Nomor Induk Siswa (NIS)</label>
                                <input type="text" required placeholder="Contoh: 24011" value={nis} onChange={e=>setNis(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition text-sm" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Nama Lengkap Siswa</label>
                                <input type="text" required placeholder="Contoh: Adelia Pratiwi" value={nama} onChange={e=>setNama(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition text-sm" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Rombel / Kelas</label>
                                <input type="text" required placeholder="Contoh: XI-A atau XI-MIPA" value={kelas} onChange={e=>setKelas(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition text-sm uppercase" />
                            </div>
                            <button type="submit" disabled={isSubmitting} className="w-full bg-indigo-600 text-white font-semibold py-3 rounded-xl hover:bg-indigo-700 transition duration-150 disabled:opacity-50 text-sm shadow-md shadow-indigo-600/10">
                                {isSubmitting ? 'Sedang Menyimpan...' : 'Masukkan Data Siswa'}
                            </button>
                        </form>
                    </div>

                    {/* Daftar Siswa */}
                    <div className="lg:col-span-2 bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col">
                        <h3 className="text-lg font-bold text-slate-900 mb-6 border-b border-slate-100 pb-3">
                            Daftar Seluruh Murid Terdaftar ({students.length})
                        </h3>
                        <div className="overflow-y-auto max-h-[60vh] rounded-xl border border-slate-100">
                            <table className="w-full text-left border-collapse text-sm">
                                <thead className="sticky top-0 bg-slate-50 font-semibold z-10 border-b border-slate-100">
                                    <tr className="text-slate-500">
                                        <th className="p-4">Kelas</th>
                                        <th className="p-4">NIS</th>
                                        <th className="p-4">Nama Lengkap</th>
                                        <th className="p-4 text-center">Hapus</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {students.map(s => (
                                        <tr key={s.id} className="border-b hover:bg-slate-50/30 transition">
                                            <td className="p-4"><span className="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold bg-indigo-50 text-indigo-700">{s.kelas}</span></td>
                                            <td className="p-4 text-slate-600 font-mono text-xs">{s.nis}</td>
                                            <td className="p-4 text-slate-800 font-medium">{s.nama}</td>
                                            <td className="p-4 text-center">
                                                <button onClick={() => deleteStudent(s.id)} className="p-2 text-rose-500 hover:bg-rose-50 rounded-lg transition" title="Hapus Siswa">
                                                    <IconTrash />
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                    {students.length === 0 && (
                                        <tr>
                                            <td colSpan="4" className="p-12 text-center text-slate-400">
                                                Belum ada data siswa di database.
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const ViewIsiJurnal = ({ students, addJournal, onSuccess, triggerAlert }) => {
            const [tanggal, setTanggal] = useState(new Date().toISOString().split('T')[0]);
            const [kelasTerpilih, setKelasTerpilih] = useState('');
            const [mapel, setMapel] = useState('');
            const [materi, setMateri] = useState('');
            const [catatan, setCatatan] = useState('');
            const [absensi, setAbsensi] = useState({});
            const [fotoBase64, setFotoBase64] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);

            const availableClasses = useMemo(() => {
                return [...new Set(students.map(s => s.kelas))].sort();
            }, [students]);
            
            const studentsInClass = useMemo(() => {
                return students.filter(s => s.kelas === kelasTerpilih);
            }, [students, kelasTerpilih]);

            useEffect(() => {
                const initialAbsen = {};
                studentsInClass.forEach(s => {
                    initialAbsen[s.id] = 'H';
                });
                setAbsensi(initialAbsen);
            }, [studentsInClass]);

            const handleAbsenChange = (studentId, status) => {
                setAbsensi(prev => ({ ...prev, [studentId]: status }));
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > MAX_WIDTH) {
                            height = Math.round((height * MAX_WIDTH) / width);
                            width = MAX_WIDTH;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        const base64Str = canvas.toDataURL('image/jpeg', 0.65);
                        setFotoBase64(base64Str);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!kelasTerpilih || studentsInClass.length === 0) {
                    triggerAlert("Formulir Belum Lengkap", "Harap pilih kelas yang telah memiliki murid sebelum menyimpan jurnal!");
                    return;
                }
                
                setIsSubmitting(true);
                
                let hadir = 0, sakit = 0, izin = 0, alpa = 0;
                Object.values(absensi).forEach(val => {
                    if(val === 'H') hadir++;
                    else if(val === 'S') sakit++;
                    else if(val === 'I') izin++;
                    else if(val === 'A') alpa++;
                });

                const payload = {
                    tanggal,
                    kelas: kelasTerpilih,
                    mapel,
                    materi,
                    catatan,
                    fotoUrl: fotoBase64 || "https://placehold.co/800x450/e2e8f0/64748b?text=Tidak+Ada+Dokumentasi+KBM",
                    waktu_input: new Date().toISOString(),
                    absensi_data: absensi,
                    rekap: { hadir, sakit, izin, alpa }
                };

                try {
                    await addJournal(payload);
                    onSuccess();
                } catch (error) {
                    console.error(error);
                }
                setIsSubmitting(false);
            };

            return (
                <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 max-w-5xl mx-auto">
                    <div className="border-b border-slate-100 pb-4 mb-6">
                        <h2 className="text-xl font-bold text-slate-900">Form Jurnal Mengajar Terintegrasi</h2>
                        <p className="text-xs text-slate-500 mt-1">Pengisian lembar jurnal KBM sekaligus mengabsen seluruh murid</p>
                    </div>
                    
                    <form onSubmit={handleSubmit} className="space-y-8">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-50 p-6 rounded-2xl border border-slate-100">
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Tanggal Pertemuan</label>
                                <input type="date" required value={tanggal} onChange={e=>setTanggal(e.target.value)} className="w-full p-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none bg-white text-sm" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Pilih Kelas</label>
                                <select required value={kelasTerpilih} onChange={e=>setKelasTerpilih(e.target.value)} className="w-full p-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none bg-white text-sm font-semibold">
                                    <option value="">-- Silakan Pilih Kelas --</option>
                                    {availableClasses.map(k => <option key={k} value={k}>{k}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Mata Pelajaran</label>
                                <input type="text" required placeholder="Contoh: Fisika Terapan" value={mapel} onChange={e=>setMapel(e.target.value)} className="w-full p-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-sm" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Pokok Bahasan / Materi</label>
                                <input type="text" required placeholder="Contoh: Hukum Newton 1, 2, dan 3" value={materi} onChange={e=>setMateri(e.target.value)} className="w-full p-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none text-sm" />
                            </div>
                        </div>

                        {kelasTerpilih && studentsInClass.length > 0 ? (
                            <div className="border border-slate-200/80 rounded-2xl overflow-hidden shadow-sm">
                                <div className="bg-slate-50 px-6 py-4 border-b border-slate-200/80 flex justify-between items-center">
                                    <h3 className="font-bold text-slate-800 text-sm">Lembar Absensi: Kelas {kelasTerpilih}</h3>
                                    <span className="text-xs bg-indigo-50 text-indigo-600 font-bold px-3 py-1 rounded-full">{studentsInClass.length} Siswa Terdaftar</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-sm border-collapse">
                                        <thead>
                                            <tr className="border-b border-slate-200 text-slate-500 font-semibold bg-slate-50/50">
                                                <th className="p-4 w-12 text-center">No</th>
                                                <th className="p-4">Nama Siswa</th>
                                                <th className="p-4 text-center text-emerald-600">Hadir</th>
                                                <th className="p-4 text-center text-amber-500">Sakit</th>
                                                <th className="p-4 text-center text-blue-500">Izin</th>
                                                <th className="p-4 text-center text-rose-500">Alpa</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {studentsInClass.map((s, idx) => (
                                                <tr key={s.id} className="hover:bg-slate-50/20 transition">
                                                    <td className="p-4 text-center text-slate-400">{idx + 1}</td>
                                                    <td className="p-4">
                                                        <span className="font-semibold text-slate-800">{s.nama}</span>
                                                        <span className="text-[10px] text-slate-400 block font-mono mt-0.5">{s.nis}</span>
                                                    </td>
                                                    {['H', 'S', 'I', 'A'].map(status => (
                                                        <td key={status} className="p-4 text-center">
                                                            <input 
                                                                type="radio" 
                                                                name={`absen_${s.id}`} 
                                                                value={status}
                                                                checked={absensi[s.id] === status}
                                                                onChange={() => handleAbsenChange(s.id, status)}
                                                                className="w-5 h-5 cursor-pointer accent-indigo-600"
                                                            />
                                                        </td>
                                                    ))}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        ) : kelasTerpilih ? (
                            <div className="p-8 text-center text-amber-600 bg-amber-50 rounded-2xl border border-amber-200/50 text-sm font-medium">
                                Belum ada siswa yang didaftarkan pada kelas ini.
                            </div>
                        ) : null}

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Catatan Kelas / Hambatan KBM</label>
                                <textarea rows="5" value={catatan} onChange={e=>setCatatan(e.target.value)} className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none resize-none text-sm placeholder-slate-300" placeholder="Hambatan pembelajaran hari ini..."></textarea>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 tracking-wider uppercase mb-1.5">Foto Dokumentasi KBM</label>
                                <div className="border-2 border-dashed border-slate-200 rounded-2xl p-6 text-center hover:bg-slate-50 transition relative h-[142px] flex flex-col justify-center items-center">
                                    {fotoBase64 ? (
                                        <div className="relative">
                                            <img src={fotoBase64} alt="Preview" className="h-28 rounded-lg shadow-md mx-auto object-cover" />
                                            <button type="button" onClick={() => setFotoBase64(null)} className="absolute -top-2 -right-2 bg-rose-500 text-white rounded-full p-1 shadow hover:bg-rose-600 transition">
                                                <IconTrash />
                                            </button>
                                        </div>
                                    ) : (
                                        <>
                                            <IconImage className="mx-auto text-slate-300 mb-2" />
                                            <p className="text-xs text-slate-400 mb-1">Unggah dokumentasi kelas (.jpg, .png)</p>
                                            <input type="file" accept="image/*" onChange={handleImageUpload} className="block w-full text-xs text-slate-500 file:mr-4 file:py-1.5 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 cursor-pointer" />
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>

                        <div className="pt-6 border-t border-slate-100">
                            <button type="submit" disabled={isSubmitting || !kelasTerpilih || studentsInClass.length === 0} className="w-full py-4 bg-indigo-600 text-white text-base font-bold rounded-2xl shadow-xl shadow-indigo-600/10 hover:bg-indigo-700 transition duration-150 disabled:opacity-50">
                                {isSubmitting ? 'Menyimpan Semua Data...' : 'Simpan Jurnal &amp; Absensi Kelas'}
                            </button>
                        </div>
                    </form>
                </div>
            );
        };

        const ViewRiwayat = ({ journals, deleteJournal }) => {
            const [selectedJournal, setSelectedJournal] = useState(null);

            if (selectedJournal) {
                return <ViewDetailJurnal journal={selectedJournal} onClose={() => setSelectedJournal(null)} deleteJournal={deleteJournal} showDeleteBtn={true} />;
            }

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden print-hidden">
                    <div className="px-6 py-5 border-b border-slate-100 bg-slate-50/75 flex justify-between items-center">
                        <h2 className="text-base font-bold text-slate-800">Riwayat Jurnal KBM Guru</h2>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full text-left">
                            <thead>
                                <tr className="border-b border-slate-100 text-slate-500 text-xs font-bold uppercase tracking-wider bg-slate-50/30">
                                    <th className="p-4">Tanggal</th>
                                    <th className="p-4">Kelas</th>
                                    <th className="p-4">Mata Pelajaran</th>
                                    <th className="p-4">Pembahasan Materi</th>
                                    <th className="p-4 text-center">Kehadiran</th>
                                    <th className="p-4 text-center">Tindakan</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {journals.map(j => (
                                    <tr key={j.id} className="hover:bg-indigo-50/10 transition">
                                        <td className="p-4 text-sm font-medium text-slate-800 whitespace-nowrap">{j.tanggal}</td>
                                        <td className="p-4"><span className="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold bg-indigo-50 text-indigo-700">{j.kelas}</span></td>
                                        <td className="p-4 text-sm font-semibold text-slate-700">{j.mapel}</td>
                                        <td className="p-4 text-sm text-slate-500 truncate max-w-[200px]">{j.materi}</td>
                                        <td className="p-4 text-center text-sm">
                                            <span className="text-emerald-600 font-extrabold">{j.rekap?.hadir || 0}</span>
                                            <span className="text-slate-300 mx-1">/</span>
                                            <span className="text-rose-500 font-extrabold">{j.rekap?.alpa || 0}</span>
                                        </td>
                                        <td className="p-4 text-center">
                                            <button onClick={() => setSelectedJournal(j)} className="px-3 py-1.5 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 rounded-lg text-xs font-semibold transition">
                                                Detail KBM
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const ViewMonitoringJurnal = ({ journals, deleteJournal }) => {
            const [selectedJournal, setSelectedJournal] = useState(null);

            if (selectedJournal) {
                return <ViewDetailJurnal journal={selectedJournal} onClose={() => setSelectedJournal(null)} deleteJournal={deleteJournal} showDeleteBtn={false} />;
            }

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden print-hidden">
                    <div className="px-6 py-5 border-b border-slate-100 bg-slate-50/75 flex justify-between items-center">
                        <h2 className="text-base font-bold text-slate-800">Pemantauan Jurnal Guru Terdaftar</h2>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full text-left">
                            <thead>
                                <tr className="border-b border-slate-100 text-slate-500 text-xs font-bold uppercase tracking-wider bg-slate-50/30">
                                    <th className="p-4">Guru Pengajar</th>
                                    <th className="p-4">Tanggal KBM</th>
                                    <th className="p-4">Kelas</th>
                                    <th className="p-4">Mapel</th>
                                    <th className="p-4">Materi Pembelajaran</th>
                                    <th className="p-4 text-center">Detail</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {journals.map(j => (
                                    <tr key={j.id} className="hover:bg-indigo-50/10 transition">
                                        <td className="p-4 text-sm font-semibold text-slate-800">{j.guru_nama}</td>
                                        <td className="p-4 text-sm text-slate-500">{j.tanggal}</td>
                                        <td className="p-4"><span className="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold bg-indigo-50 text-indigo-700">{j.kelas}</span></td>
                                        <td className="p-4 text-sm text-slate-600 font-medium">{j.mapel}</td>
                                        <td className="p-4 text-sm text-slate-500 truncate max-w-[150px]">{j.materi}</td>
                                        <td className="p-4 text-center">
                                            <button onClick={() => setSelectedJournal(j)} className="px-3 py-1.5 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 rounded-lg text-xs font-semibold transition">
                                                Detail KBM
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const ViewDetailJurnal = ({ journal, onClose, deleteJournal, showDeleteBtn }) => {
            return (
                <div className="max-w-4xl mx-auto relative print-block">
                    {/* Kop Cetak Formal */}
                    <div className="hidden print-block text-center border-b-2 border-slate-900 pb-5 mb-8">
                        <h1 className="text-xl font-bold uppercase text-slate-900 leading-tight">PEMERINTAH PROVINSI SULAWESI SELATAN</h1>
                        <h2 className="text-lg font-black uppercase text-slate-900 mt-1">SMK NEGERI 3 SELAYAR</h2>
                        <p className="text-xs text-slate-500 mt-1">Alamat: Jl. Pendidikan No. 3 Benteng, Kab. Kepulauan Selayar</p>
                        <div className="w-full h-1 bg-slate-900 mt-3"></div>
                    </div>

                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-100 print:border-none print:shadow-none print:p-0">
                        <div className="flex justify-between items-start mb-6 border-b border-slate-100 pb-4 print-hidden">
                            <div>
                                <h2 className="text-xl font-bold text-slate-900">Lembar Jurnal Mengajar</h2>
                                <p className="text-xs text-slate-500">Guru Pengajar: {journal.guru_nama}</p>
                            </div>
                            <div className="flex items-center space-x-2">
                                <button onClick={() => window.print()} className="px-4 py-2 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 font-semibold text-xs transition flex items-center space-x-2 shadow-sm shadow-emerald-600/10">
                                    <IconPrint/> <span>Cetak</span>
                                </button>
                                {showDeleteBtn && (
                                    <button onClick={() => deleteJournal(journal.id)} className="px-4 py-2 bg-rose-50 text-rose-600 hover:bg-rose-100 rounded-xl font-semibold text-xs transition flex items-center space-x-2">
                                        <IconTrash/> <span>Hapus</span>
                                    </button>
                                )}
                                <button onClick={onClose} className="px-4 py-2 bg-slate-100 text-slate-600 hover:bg-slate-200 rounded-xl font-semibold text-xs transition">Kembali</button>
                            </div>
                        </div>

                        {/* Rincian KBM */}
                        <div className="grid grid-cols-2 gap-6 bg-slate-50 p-5 rounded-2xl border border-slate-100 mb-8 text-sm">
                            <div><span className="font-bold text-slate-400 block text-[10px] uppercase tracking-wider mb-0.5">Guru Pengajar</span> <p className="text-slate-800 font-bold">{journal.guru_nama}</p></div>
                            <div><span className="font-bold text-slate-400 block text-[10px] uppercase tracking-wider mb-0.5">Tanggal KBM</span> <p className="text-slate-800 font-medium">{journal.tanggal}</p></div>
                            <div><span className="font-bold text-slate-400 block text-[10px] uppercase tracking-wider mb-0.5">Kelas / Rombel</span> <p className="text-slate-800 font-bold text-indigo-600">{journal.kelas}</p></div>
                            <div><span className="font-bold text-slate-400 block text-[10px] uppercase tracking-wider mb-0.5">Mata Pelajaran</span> <p className="text-slate-800 font-medium">{journal.mapel}</p></div>
                            <div className="col-span-2"><span className="font-bold text-slate-400 block text-[10px] uppercase tracking-wider mb-0.5">Pokok Bahasan / Materi</span> <p className="text-slate-800 font-semibold text-base">{journal.materi}</p></div>
                        </div>

                        {/* Rekap Absen */}
                        <div className="mb-8 p-5 bg-indigo-50/40 rounded-2xl border border-indigo-100/50">
                            <h3 className="font-bold text-xs uppercase tracking-wider text-indigo-900 mb-3">Kehadiran Kelas</h3>
                            <div className="grid grid-cols-4 gap-4 text-center">
                                <div className="bg-white p-3 rounded-xl border border-indigo-100/30 shadow-sm"><span className="block text-[10px] font-bold text-slate-400 uppercase">Hadir</span><span className="text-xl font-extrabold text-emerald-600">{journal.rekap?.hadir || 0}</span></div>
                                <div className="bg-white p-3 rounded-xl border border-indigo-100/30 shadow-sm"><span className="block text-[10px] font-bold text-slate-400 uppercase">Sakit</span><span className="text-xl font-extrabold text-amber-500">{journal.rekap?.sakit || 0}</span></div>
                                <div className="bg-white p-3 rounded-xl border border-indigo-100/30 shadow-sm"><span className="block text-[10px] font-bold text-slate-400 uppercase">Izin</span><span className="text-xl font-extrabold text-blue-500">{journal.rekap?.izin || 0}</span></div>
                                <div className="bg-white p-3 rounded-xl border border-indigo-100/30 shadow-sm"><span className="block text-[10px] font-bold text-slate-400 uppercase">Alpa</span><span className="text-xl font-extrabold text-rose-500">{journal.rekap?.alpa || 0}</span></div>
                            </div>
                        </div>

                        <div className="mb-8">
                            <h3 className="font-bold text-xs uppercase tracking-wider text-slate-400 mb-2 border-b border-slate-100 pb-1">Catatan KBM &amp; Kendala</h3>
                            <p className="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed">{journal.catatan || 'Tidak ada catatan khusus.'}</p>
                        </div>

                        {journal.fotoUrl && (
                            <div className="mb-12 print-break-inside-avoid">
                                <h3 className="font-bold text-xs uppercase tracking-wider text-slate-400 mb-3 border-b border-slate-100 pb-1">Dokumentasi Foto KBM</h3>
                                <img src={journal.fotoUrl} alt="Dokumentasi KBM" className="max-w-lg w-full h-auto rounded-2xl border border-slate-100 shadow-md" />
                            </div>
                        )}

                        {/* Kolom Tanda Tangan Cetak Formal */}
                        <div className="hidden print:flex justify-between mt-20 pt-8 border-t border-slate-100">
                            <div className="text-center w-48">
                                <p className="text-xs text-slate-500">Mengetahui,</p>
                                <p className="text-xs font-semibold text-slate-800">Kepala Sekolah</p>
                                <div className="h-20"></div>
                                <p className="font-bold text-slate-900 underline">Drs. H. Ahmad Yani, M.Pd.</p>
                                <p className="text-[10px] text-slate-400 mt-1">NIP. 19700101</p>
                            </div>
                            <div className="text-center w-48">
                                <p className="text-xs text-slate-500">Menyatakan Sebenarnya,</p>
                                <p className="text-xs font-semibold text-slate-800">Guru Pengajar</p>
                                <div className="h-20"></div>
                                <p className="font-bold text-slate-900 underline">{journal.guru_nama}</p>
                                <p className="text-[10px] text-slate-400 mt-1">NIP. {journal.guru_nip}</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const ViewRekap = ({ journals, students, loggedInUser }) => {
            const [filterKelas, setFilterKelas] = useState('');
            const [filterBulan, setFilterBulan] = useState(new Date().toISOString().slice(0, 7)); // YYYY-MM
            const [activeTab, setActiveTab] = useState('kehadiran'); // kehadiran atau jurnal

            const availableClasses = useMemo(() => {
                return [...new Set(students.map(s => s.kelas))].sort();
            }, [students]);

            useEffect(() => {
                if (availableClasses.length > 0 && !filterKelas) {
                    setFilterKelas(availableClasses[0]);
                }
            }, [availableClasses, filterKelas]);

            // Filter rekap KBM absensi per siswa
            const attendanceRecap = useMemo(() => {
                if (!filterKelas || !filterBulan) return { dates: [], studentData: [] };

                const classStudents = students.filter(s => s.kelas === filterKelas);
                const classJournals = journals.filter(j => 
                    j.kelas === filterKelas && 
                    j.tanggal.startsWith(filterBulan)
                ).sort((a,b) => a.tanggal.localeCompare(b.tanggal));

                const dates = classJournals.map(j => ({ id: j.id, date: j.tanggal.split('-')[2] }));

                const studentData = classStudents.map(siswa => {
                    const absensiArr = classJournals.map(j => {
                        return j.absensi_data ? j.absensi_data[siswa.id] || '-' : '-';
                    });
                    
                    const totalH = absensiArr.filter(x => x === 'H').length;
                    const totalS = absensiArr.filter(x => x === 'S').length;
                    const totalI = absensiArr.filter(x => x === 'I').length;
                    const totalA = absensiArr.filter(x => x === 'A').length;

                    return { ...siswa, absensiArr, totalH, totalS, totalI, totalA };
                });

                return { dates, studentData };
            }, [journals, students, filterKelas, filterBulan]);

            // Filter rekap lembar agenda pembelajaran (KBM)
            const journalsRecap = useMemo(() => {
                if (!filterKelas || !filterBulan) return [];
                
                return journals.filter(j => 
                    j.kelas === filterKelas && 
                    j.tanggal.startsWith(filterBulan)
                ).sort((a,b) => a.tanggal.localeCompare(b.tanggal));
            }, [journals, filterKelas, filterBulan]);

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden print-block print:border-none print:shadow-none print:p-0">
                    
                    {/* Tab Navigation Menu */}
                    <div className="print-hidden border-b border-slate-100 flex flex-wrap bg-slate-50/50 justify-between items-center px-6">
                        <div className="flex space-x-1 py-3">
                            <button 
                                onClick={() => setActiveTab('kehadiran')}
                                className={`px-5 py-2.5 font-bold text-xs tracking-wide uppercase rounded-xl transition ${activeTab === 'kehadiran' ? 'bg-indigo-600 text-white shadow-md shadow-indigo-600/10' : 'text-slate-500 hover:text-slate-800'}`}
                            >
                                Rekap Kehadiran Siswa
                            </button>
                            <button 
                                onClick={() => setActiveTab('jurnal')}
                                className={`px-5 py-2.5 font-bold text-xs tracking-wide uppercase rounded-xl transition ${activeTab === 'jurnal' ? 'bg-indigo-600 text-white shadow-md shadow-indigo-600/10' : 'text-slate-500 hover:text-slate-800'}`}
                            >
                                Rekap Kegiatan Belajar (KBM)
                            </button>
                        </div>

                        {/* Top Filters */}
                        <div className="flex items-center space-x-3 py-3">
                            <select value={filterKelas} onChange={e=>setFilterKelas(e.target.value)} className="p-2 text-xs border border-slate-200 rounded-xl font-semibold outline-none bg-white">
                                {availableClasses.map(k => <option key={k} value={k}>Kelas: {k}</option>)}
                            </select>
                            <input type="month" value={filterBulan} onChange={e=>setFilterBulan(e.target.value)} className="p-2 text-xs border border-slate-200 rounded-xl font-semibold outline-none bg-white" />
