        const ViewLogin = ({ onLoginSuccess, firebaseActive, appInfo }) => {

            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const [activeRoleTab, setActiveRoleTab] = useState('guru'); 

            const handleLogin = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);

                const cleanNip = nip.trim();
                const cleanPassword = password.trim();

                try {
                    if (!firebaseActive) {
                        const localUsers = JSON.parse(safeStorage.getItem('jurnal_gurus')) || DUMMY_USERS;
                        const match = localUsers.find(g => g.nip === cleanNip && g.password === cleanPassword && g.role === activeRoleTab);
                        if (match) {
                            onLoginSuccess(match);
                        } else {
                            setError(`Data login simulasi salah!`);
                        }
                    } else {
                        const { collection, getDocs } = window.firebaseFirestoreSDK;
                        const db = window.activeDb;
                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ejurnal-terpadu-cloud';
                        
                        const ref = collection(db, 'artifacts', appId, 'public', 'data', 'gurus');
                        const querySnapshot = await getDocs(ref);
                        const allGurus = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        
                        const match = allGurus.find(g => 
                            g.nip === cleanNip && 
                            g.password === cleanPassword && 
                            g.role === activeRoleTab
                        );

                        if (match) {
                            onLoginSuccess(match);
                        } else {
                            setError(`NIP atau Password salah pada server Cloud!`);
                        }
                    }
                } catch (err) {
                    console.error(err);
                    setError('Koneksi database Cloud gagal.');
                } finally {
                    setLoading(false);
                }

                        </div>

                                <span className="w-1.5 h-1.5 rounded-full mr-1.5 bg-emerald-400 animate-pulse"></span>
                                Cloud Active (Strict Mode)
                            </span>
                        </div>

                        <div className="grid grid-cols-3 gap-1 bg-white/5 p-1 rounded-2xl border border-white/10 mb-6">
                            {['guru', 'kepsek', 'admin'].map((role) => (
                                <button 
                                    key={role}
                                    onClick={() => { setActiveRoleTab(role); setError(''); }} 
                                    className={`py-2 px-1 rounded-xl text-[11px] font-bold transition ${activeRoleTab === role ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}
                                >
                                    {role.toUpperCase()}
                                </button>
                            ))}
                        </div>

                        {error && (
                            <div className="bg-rose-500/10 border border-rose-500/20 text-rose-300 rounded-2xl p-3 text-xs mb-6 text-center font-medium">
                                {error}
                            </div>
                        )}

                                </label>

{`function doPost(e) {
  try {
    var data = JSON.parse(e.postData.contents);
    var folderId = "MASUKKAN_ID_FOLDER_DRIVE_ANDA";
    var folder = DriveApp.getFolderById(folderId);
    
    var decoded = Utilities.base64Decode(data.base64);
    var blob = Utilities.newBlob(decoded, data.contentType, data.fileName);

}`}

            const journalsToday = journals.filter(j => j.tanggal === today).length;
            const classesCount = new Set(students.map(s => s.kelas)).size;

            return (
                <div className="space-y-8 animate-in fade-in duration-200">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        <StatCard title="Siswa Terdaftar (Cloud)" value={students.length} color="indigo" icon={<IconUsers/>} onClick={() => changeView('siswa')} />
                        <StatCard title="Rombel Aktif" value={classesCount} color="sky" icon={<IconBook/>} onClick={() => changeView('siswa')} />
                        <StatCard title="Jurnal Kelas Hari Ini" value={journalsToday} color="emerald" icon={<IconHistory/>} onClick={() => changeView('riwayat')} />
                    </div>

                    <div className="bg-white p-6 md:p-8 rounded-3xl border border-slate-100 flex flex-col">
                        <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-6 pb-4 border-b">
                            <div>
                                <h3 className="text-lg font-bold text-slate-900">Aktivitas Jurnal Mengajar Terbaru</h3>
                                <p className="text-slate-500 text-xs">Menampilkan 5 entri pembelajaran terakhir pada server Cloud</p>
                            </div>
                            <button onClick={() => changeView('riwayat')} className="mt-3 sm:mt-0 text-sm font-semibold text-indigo-600 hover:text-indigo-800">
                                Selengkapnya &rarr;
                            </button>
                        </div>

                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm">
                                <thead>
                                    <tr className="bg-slate-50 text-slate-500 font-semibold border-b">
                                        <th className="p-4">Tanggal</th>
                                        <th className="p-4">Kelas</th>
                                        <th className="p-4">Mata Pelajaran</th>
                                        <th className="p-4">Materi Pembahasan</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {journals.slice(0, 5).map((j, i) => (
                                        <tr key={i} className="hover:bg-slate-50/50 transition">
                                            <td className="p-4 font-medium text-slate-800">{j.tanggal}</td>
                                            <td className="p-4"><span className="px-2.5 py-1 rounded-full text-xs font-bold bg-indigo-50 text-indigo-700">{j.kelas}</span></td>
                                            <td className="p-4 text-slate-600 font-medium">{j.mapel}</td>
                                            <td className="p-4 text-slate-500 max-w-xs truncate">{j.materi}</td>
                                        </tr>
                                    ))}
                                    {journals.length === 0 && (
                                        <tr>
                                            <td colSpan="4" className="p-12 text-center text-slate-400">Belum ada data KBM yang diunggah ke Cloud.</td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const ViewDashboardKepsek = ({ journals, students, changeView }) => {
            const today = new Date().toISOString().split('T')[0];
            const journalsToday = journals.filter(j => j.tanggal === today).length;
            const uniqueTeachers = new Set(journals.map(j => j.guru_nama)).size;
            const classesCount = new Set(students.map(s => s.kelas)).size;

            return (
                <div className="space-y-8">
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <StatCard title="Guru Pengajar Aktif" value={uniqueTeachers || 0} color="indigo" icon={<IconUsers/>} onClick={() => changeView('monitoring_jurnal')} />
                        <StatCard title="Siswa Cloud" value={students.length} color="sky" icon={<IconUsers/>} />
                        <StatCard title="Jumlah Rombel" value={classesCount} color="indigo" icon={<IconBook/>} />
                        <StatCard title="KBM Hari Ini" value={journalsToday} color="emerald" icon={<IconHistory/>} onClick={() => changeView('monitoring_jurnal')} />
                    </div>

                    <div className="bg-white p-6 md:p-8 rounded-3xl border border-slate-100">
                        <h3 className="text-lg font-bold text-slate-900 mb-4">Pemantauan Jurnal Real-Time Kepala Sekolah</h3>
                        <p className="text-slate-500 text-sm leading-relaxed mb-4">
                            Selaku Kepala Sekolah, Anda dapat memantau produktivitas pengajaran guru secara langsung tanpa perlu meminta rekap fisik. Seluruh log mengajar dan foto presensi otomatis masuk ke basis data saat guru menyelesaikan pelajaran.
                        </p>
                        <button onClick={() => changeView('monitoring_jurnal')} className="bg-indigo-600 text-white font-bold px-5 py-2.5 rounded-xl text-xs shadow-md">
                            Mulai Monitoring Real-Time
                        </button>
                    </div>
                </div>
            );
        };

        const StatCard = ({ title, value, color, icon, onClick }) => {
            const colors = {
                indigo: 'bg-indigo-600/10 text-indigo-600 border border-indigo-600/20',
                sky: 'bg-sky-500/10 text-sky-500 border border-sky-500/20',
                emerald: 'bg-emerald-500/10 text-emerald-500 border border-emerald-500/20'
            };
            return (
                <div onClick={onClick} className="bg-white rounded-3xl border border-slate-100 p-6 flex items-center space-x-5 cursor-pointer hover:shadow-md transition">
                    <div className={`p-4 rounded-2xl ${colors[color] || 'bg-slate-50 text-slate-700'}`}>
                        {icon}
                    </div>
                    <div>
                        <p className="text-xs font-semibold text-slate-400 uppercase">{title}</p>
                        <p className="text-3xl font-extrabold text-slate-800 mt-1">{value}</p>
                    </div>
                </div>
            );
        };

        const ViewDataSiswa = ({ students, classes, addStudent, updateStudent, addStudentsBulk, deleteStudent, deleteStudentsBulk, triggerAlert, triggerConfirm }) => {
            const [activeFormTab, setActiveFormTab] = useState('single'); 
            const [nama, setNama] = useState('');
            const [nis, setNis] = useState('');
            const [kelas, setKelas] = useState('');
            const [bulkText, setBulkText] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [filterKelas, setFilterKelas] = useState('Semua');
            const [searchQuery, setSearchQuery] = useState('');

            const availableClasses = useMemo(() => {
                return ['Semua', ...classes.map(c => c.nama)].sort();
            }, [classes]);

            const filteredStudents = useMemo(() => {
                return students.filter(s => {
                    const matchesClass = filterKelas === 'Semua' || s.kelas === filterKelas;
                    const matchesSearch = s.nama.toLowerCase().includes(searchQuery.toLowerCase()) || s.nis.includes(searchQuery);
                    return matchesClass && matchesSearch;
                });
            }, [students, filterKelas, searchQuery]);

            const handleAddOrUpdate = async (e) => {
                e.preventDefault();
                if(!nama.trim() || !nis.trim() || !kelas) return;
                setIsSubmitting(true);
                try {
                    const payload = { nama: nama.trim(), nis: nis.trim(), kelas: kelas };
                    if (editingId) {
                        await updateStudent(editingId, payload);
                        setEditingId(null);
                        triggerAlert("Sukses", "Data siswa berhasil diubah di Cloud!");
                    } else {
                        const exist = students.find(s => s.nis === payload.nis);
                        if (exist) {
                            triggerAlert("Peringatan", "NIS Siswa sudah terdaftar!");
                            setIsSubmitting(false);
                            return;
                        }
                        await addStudent(payload);
                        triggerAlert("Sukses", "Siswa baru berhasil disinkronkan ke Cloud!");
                    }
                    setNama(''); setNis(''); setKelas('');
                } catch (error) {
                    console.error(error);
                }
                setIsSubmitting(false);
            };

            const handleBulkImport = async (e) => {
                e.preventDefault();
                if(!bulkText.trim()) return;
                setIsSubmitting(true);

                const lines = bulkText.split('\n');
                const list = [];
                for (let line of lines) {
                    if (!line.trim()) continue;
                    const cols = line.split('\t');
                    if (cols.length >= 3) {
                        list.push({ nis: cols[0].trim(), nama: cols[1].trim(), kelas: cols[2].trim().toUpperCase() });
                    }
                }

                if (list.length > 0) {
                    try {
                        await addStudentsBulk(list);
                        setBulkText('');
                        triggerAlert("Bulk Sukses", `Berhasil mengunggah ${list.length} siswa baru ke Cloud!`);
                    } catch (error) {
                        console.error(error);
                    }
                }
                setIsSubmitting(false);
            };

            const startEdit = (s) => {
                setEditingId(s.id);
                setNama(s.nama);
                setNis(s.nis);
                setKelas(s.kelas);
                setActiveFormTab('single');
            };

            const handleDeleteSingle = (s) => {
                triggerConfirm(
                    "Hapus Siswa",
                    `Apakah Anda yakin ingin menghapus siswa ${s.nama}?`,
                    async () => {
                        await deleteStudent(s.id);
                        triggerAlert("Berhasil", "Data siswa dihapus dari Cloud.");
                    }
                );
            };

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="bg-white p-6 md:p-8 rounded-3xl border border-slate-100 h-fit">
                        <div className="flex border-b mb-6">
                            <button onClick={() => setActiveFormTab('single')} className={`flex-1 pb-3 text-xs font-bold uppercase ${activeFormTab === 'single' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-slate-400'}`}>
                                {editingId ? 'Edit Siswa' : 'Kombinasi Baru'}
                            </button>
                            {!editingId && (
                                <button onClick={() => setActiveFormTab('bulk')} className={`flex-1 pb-3 text-xs font-bold uppercase ${activeFormTab === 'bulk' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-slate-400'}`}>
                                    Impor Massal (Excel)
                                </button>
                            )}
                        </div>

                        {activeFormTab === 'single' ? (
                            <form onSubmit={handleAddOrUpdate} className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 mb-1">NIS Siswa</label>
                                    <input type="text" required placeholder="Contoh: 24011" value={nis} onChange={e=>setNis(e.target.value)} className="w-full p-2.5 border rounded-xl text-sm" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 mb-1">Nama Lengkap</label>
                                    <input type="text" required placeholder="Nama" value={nama} onChange={e=>setNama(e.target.value)} className="w-full p-2.5 border rounded-xl text-sm" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 mb-1">Kelas Rombel</label>
                                    <select required value={kelas} onChange={e=>setKelas(e.target.value)} className="w-full p-2.5 border rounded-xl text-sm bg-white">
                                        <option value="">-- Pilih Kelas --</option>
                                        {classes.map(c => <option key={c.id} value={c.nama}>{c.nama}</option>)}
                                    </select>
                                </div>
                                <button type="submit" disabled={isSubmitting} className="w-full bg-indigo-600 text-white font-bold py-2.5 rounded-xl">
                                    {isSubmitting ? 'Mengunggah...' : 'Kirim Ke Server'}
                                </button>
                            </form>
                        ) : (
                            <form onSubmit={handleBulkImport} className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-400 mb-1">Tempel Tabel Excel (NIS [Tab] Nama [Tab] Kelas)</label>
                                    <textarea required rows="8" placeholder="24001&#9;Siswa A&#9;XI-A" value={bulkText} onChange={e=>setBulkText(e.target.value)} className="w-full p-2.5 border rounded-xl text-xs font-mono"></textarea>
                                </div>
                                <button type="submit" disabled={isSubmitting} className="w-full bg-indigo-600 text-white font-bold py-2.5 rounded-xl">
                                    Mulai Impor Massal Cloud
                                </button>
                            </form>
                        )}
                    </div>

                    <div className="lg:col-span-2 bg-white p-6 md:p-8 rounded-3xl border border-slate-100">
                        <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6 border-b pb-4">
                            <h3 className="text-lg font-bold text-slate-900">Database Siswa ({filteredStudents.length})</h3>
                            <div className="flex items-center space-x-2">
                                <select value={filterKelas} onChange={e => setFilterKelas(e.target.value)} className="p-2 border rounded-xl text-xs bg-white font-sans font-bold">
                                    {availableClasses.map(c => <option key={c} value={c}>{c === 'Semua' ? 'Semua Kelas' : c}</option>)}
                                </select>
                                <input type="text" placeholder="Cari nama / NIS..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="p-2 border rounded-xl text-xs w-32 font-sans" />
                            </div>
                        </div>

                        <div className="overflow-y-auto max-h-[60vh] rounded-xl border">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-slate-50 sticky top-0 border-b">
                                    <tr>
                                        <th className="p-3">Kelas</th>
                                        <th className="p-3">NIS</th>
                                        <th className="p-3">Nama Lengkap</th>
                                        <th className="p-3 text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredStudents.map(s => (
                                        <tr key={s.id} className="border-b hover:bg-slate-50/50">
                                            <td className="p-3"><span className="px-2 py-0.5 rounded-md text-xs font-bold bg-indigo-50 text-indigo-700">{s.kelas}</span></td>
                                            <td className="p-3 font-mono text-xs">{s.nis}</td>
                                            <td className="p-3 font-medium text-slate-800">{s.nama}</td>
                                            <td className="p-3 text-center space-x-2">
                                                <button onClick={() => startEdit(s)} className="px-2 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-xs font-bold">Edit</button>
                                                <button onClick={() => handleDeleteSingle(s)} className="text-rose-500 hover:text-rose-100 p-1 align-middle"><IconTrash /></button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const ViewIsiJurnal = ({ students, classes, subjects, addJournal, onSuccess, triggerAlert, appInfo }) => {
            const [tanggal, setTanggal] = useState(new Date().toISOString().split('T')[0]);
            const [kelasTerpilih, setKelasTerpilih] = useState('');
            const [mapel, setMapel] = useState('');
            const [materi, setMateri] = useState('');
            const [jumlahJam, setJumlahJam] = useState('2');
            const [guruPengganti, setGuruPengganti] = useState('');
            const [catatan, setCatatan] = useState('');
            const [absensi, setAbsensi] = useState({});
            const [fotoBase64, setFotoBase64] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [uploadProgress, setUploadProgress] = useState('');

            const studentsInClass = useMemo(() => {
                return students.filter(s => s.kelas === kelasTerpilih);
            }, [students, kelasTerpilih]);

            useEffect(() => {
                const init = {};
                studentsInClass.forEach(s => { init[s.id] = 'H'; });
                setAbsensi(init);
            }, [studentsInClass]);

            const handleAbsenChange = (id, status) => {
                setAbsensi(prev => ({ ...prev, [id]: status }));
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600;
                        let w = img.width, h = img.height;
                        if (w > MAX_WIDTH) {
                            h = Math.round((h * MAX_WIDTH) / w); w = MAX_WIDTH;
                        }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        setFotoBase64(canvas.toDataURL('image/jpeg', 0.6));
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const uploadToGoogleDrive = async (base64Str, fileName) => {
                if (!appInfo.gasUrl || appInfo.gasUrl.trim() === "") {
                    // Fallback ke Base64 langsung jika URL Web App belum diatur
                    return base64Str;
                }
                
                try {
                    const match = base64Str.match(/^data:(image\/[a-z]+);base64,(.+)$/);
                    if (!match) return base64Str;
                    const contentType = match[1];
                    const rawBase64 = match[2];

                    const response = await fetch(appInfo.gasUrl, {
                        method: "POST",
                        mode: "cors",
                        headers: {
                            "Content-Type": "text/plain;charset=utf-8"
                        },
                        body: JSON.stringify({
                            base64: rawBase64,
                            contentType: contentType,
                            fileName: fileName
                        })
                    });
                    
                    const resData = await response.json();
                    if (resData.status === "success") {
                        return resData.url;
                    } else {
                        console.error("Google Drive Upload Error:", resData.message);
                        throw new Error(resData.message);
                    }
                } catch (error) {
                    console.error("Upload Google Drive Gagal:", error);
                    throw error;
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!kelasTerpilih || studentsInClass.length === 0) {
                    triggerAlert("Formulir Belum Lengkap", "Pilih kelas dengan jumlah siswa terdaftar!");
                    return;
                }
                
                setIsSubmitting(true);
                setUploadProgress("Menyiapkan dokumen...");

                try {
                    let finalFotoUrl = "https://placehold.co/800x450/e2e8f0/64748b?text=Tidak+Ada+Dokumentasi+KBM";
                    
                    if (fotoBase64) {
                        if (appInfo.gasUrl && appInfo.gasUrl.trim() !== "") {
                            setUploadProgress("Mengunggah foto ke Google Drive (Cara 2)...");
                            try {
                                finalFotoUrl = await uploadToGoogleDrive(fotoBase64, `KBM_${kelasTerpilih}_${Date.now()}.jpg`);
                            } catch (uploadErr) {
                                triggerAlert("Peringatan Google Drive", "Gagal upload Google Drive. Menggunakan penyimpanan Firestore fallback.");
                                finalFotoUrl = fotoBase64;
                            }
                        } else {
                            finalFotoUrl = fotoBase64;
                        }
                    }

                    let h = 0, s = 0, iz = 0, a = 0;
                    Object.values(absensi).forEach(val => {
                        if (val === 'H') h++;
                        else if (val === 'S') s++;
                        else if (val === 'I') iz++;
                        else if (val === 'A') a++;
                    });

                    const payload = {
                        tanggal,
                        kelas: kelasTerpilih,
                        mapel,
                        materi,
                        jumlah_jam: jumlahJam,
                        guru_pengganti: guruPengganti.trim(),
                        catatan,
                        fotoUrl: finalFotoUrl,
                        waktu_input: new Date().toISOString(),
                        absensi_data: absensi,
                        rekap: { hadir: h, sakit: s, izin: iz, alpa: a }
                    };

                    setUploadProgress("Menyinkronkan dengan server Cloud...");
                    await addJournal(payload);
                    onSuccess();
                } catch (error) {
                    console.error(error);
                    triggerAlert("Error", "Gagal menyimpan jurnal mengajar.");
                } finally {
                    setIsSubmitting(false);
                    setUploadProgress('');
                }
            };

            return (
                <div className="bg-white p-6 md:p-8 rounded-3xl border border-slate-100 max-w-5xl mx-auto">
                    <h2 className="text-xl font-bold text-slate-900 border-b pb-4 mb-6">Formulir Pengisian Jurnal Mengajar (Real-Time)</h2>
                    
                    {isSubmitting && (
                        <div className="mb-6 p-4 bg-indigo-50 border border-indigo-200 rounded-2xl flex items-center space-x-3 text-indigo-700 animate-pulse">
                            <div className="w-5 h-5 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                            <span className="text-xs font-semibold">{uploadProgress}</span>
                        </div>
                    )}

                    <form onSubmit={handleSubmit} className="space-y-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 p-5 bg-slate-50 border rounded-2xl">
                            <div>
                                <label className="block text-xs font-bold text-slate-400 mb-1">Tanggal Pertemuan</label>
                                <input type="date" required value={tanggal} onChange={e=>setTanggal(e.target.value)} className="w-full p-2 border rounded-xl text-sm" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 mb-1">Kelas</label>
                                <select required value={kelasTerpilih} onChange={e=>setKelasTerpilih(e.target.value)} className="w-full p-2 border rounded-xl text-sm bg-white font-bold">
                                    <option value="">-- Pilih Kelas --</option>
                                    {classes.map(c => <option key={c.id} value={c.nama}>{c.nama}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 mb-1">Mata Pelajaran</label>
                                <select required value={mapel} onChange={e=>setMapel(e.target.value)} className="w-full p-2 border rounded-xl text-sm bg-white">
                                    <option value="">-- Pilih Mapel --</option>
                                    {subjects.map(sub => <option key={sub.id} value={sub.nama}>{sub.nama}</option>)}
                                </select>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 mb-1">Pokok Materi</label>
                                <input type="text" required placeholder="Pembahasan utama" value={materi} onChange={e=>setMateri(e.target.value)} className="w-full p-2 border rounded-xl text-sm" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 mb-1">JP</label>
                                <input type="number" required min="1" value={jumlahJam} onChange={e=>setJumlahJam(e.target.value)} className="w-full p-2 border rounded-xl text-sm" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-400 mb-1">Guru Infal / Pengganti</label>
                                <input type="text" placeholder="Kosongkan jika mengajar mandiri" value={guruPengganti} onChange={e=>setGuruPengganti(e.target.value)} className="w-full p-2 border rounded-xl text-sm" />
                            </div>
                        </div>

                        {kelasTerpilih && studentsInClass.length > 0 && (
                            <div className="border rounded-2xl overflow-hidden shadow-sm">
                                <div className="bg-slate-50 px-5 py-3 border-b flex justify-between items-center">
                                    <h3 className="font-bold text-slate-800 text-sm">Lembar Absensi Rombel {kelasTerpilih}</h3>
                                    <span className="text-xs bg-indigo-50 text-indigo-600 font-bold px-3 py-1 rounded-full">{studentsInClass.length} Siswa</span>
                                </div>
                                <table className="w-full text-left text-sm border-collapse">
                                    <thead>
                                        <tr className="bg-slate-50/50 border-b">
                                            <th className="p-3 w-10 text-center">No</th>
                                            <th className="p-3">Nama Siswa</th>
                                            <th className="p-3 text-center text-emerald-600 font-bold">Hadir</th>
                                            <th className="p-3 text-center text-amber-500 font-bold">Sakit</th>
                                            <th className="p-3 text-center text-blue-500 font-bold">Izin</th>
                                            <th className="p-3 text-center text-rose-500 font-bold">Alpa</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {studentsInClass.map((s, idx) => (
                                            <tr key={s.id} className="hover:bg-slate-50/30">

            const availableClasses = useMemo(() => {

            useEffect(() => {
                if (availableClasses.length > 0 && !filterKelas) {
                    setFilterKelas(availableClasses[0]);

                if (!filterKelas || !filterBulan) return { dates: [], studentData: [] };

                const classStudents = students.filter(s => s.kelas === filterKelas);
                const classJournals = journals.filter(j => 
                    j.kelas === filterKelas && 
                    j.tanggal.startsWith(filterBulan)
                ).sort((a,b) => a.tanggal.localeCompare(b.tanggal));

                const dates = classJournals.map(j => ({ id: j.id, date: j.tanggal.split('-')[2] }));

                const studentData = classStudents.map(siswa => {
                    const absensiArr = classJournals.map(j => {
                        return j.absensi_data ? j.absensi_data[siswa.id] || '-' : '-';
                    });
                    
                    const totalH = absensiArr.filter(x => x === 'H').length;
                    const totalS = absensiArr.filter(x => x === 'S').length;
                    const totalI = absensiArr.filter(x => x === 'I').length;
                    const totalA = absensiArr.filter(x => x === 'A').length;

                    return { ...siswa, absensiArr, totalH, totalS, totalI, totalA };

                                                        ${status === 'A' ? 'text-rose-600' : ''}

                            </div>

            const [appInfo, setAppInfo] = useState({ version: 'v1.0.0-Cloud', creator: 'Developer SMK Negeri 3 Selayar', theme: 'indigo', gasUrl: '' });

            const [confirmState, setConfirmState] = useState({ isOpen: false, title: '', message: '', onConfirm: null });
            const [alertState, setAlertState] = useState({ isOpen: false, title: '', message: '' });

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'ejurnal-terpadu-cloud';

                });
            }, [appInfo.theme]);

            const triggerConfirm = (title, message, callback) => {
                setConfirmState({
                    isOpen: true, title, message,
                    onConfirm: () => {
                        callback();
                        setConfirmState({ isOpen: false, title: '', message: '', onConfirm: null });
                    }
                });
            };

            const triggerAlert = (title, message) => {
                setAlertState({ isOpen: true, title, message });
            };

            useEffect(() => {
                const savedUser = safeStorage.getItem('jurnal_active_user');
                if (savedUser) {
                    try { setLoggedInUser(JSON.parse(savedUser)); } catch (e) { safeStorage.removeItem('jurnal_active_user'); }
                }
            }, []);

            useEffect(() => {
                let checkAttempts = 0;
                const checkFirebaseLib = setInterval(() => {
                    checkAttempts++;
                    if (window.firebaseInitialized) {
                        clearInterval(checkFirebaseLib);
                        setupFirebaseConnection();
                    } else if (checkAttempts > 10) {
                        clearInterval(checkFirebaseLib);
                        setupLocalStorageConnection();
                    }
                }, 150);
            }, []);

            const setupFirebaseConnection = async () => {
                try {
                    const { initializeApp } = window.firebaseCore;
                    const { getAuth, signInAnonymously } = window.firebaseAuthSDK;
                    const { getFirestore, collection, onSnapshot, doc, setDoc } = window.firebaseFirestoreSDK;

                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    const db = getFirestore(app);

                    await signInAnonymously(auth);

                    setFirebaseActive(true);
                    window.activeDb = db;

                    const kopRef = doc(db, 'artifacts', appId, 'public', 'data', 'configs', 'kop');
                    onSnapshot(kopRef, (docSnap) => {
                        if (docSnap.exists()) setKop(docSnap.data());
                        else { setDoc(kopRef, DEFAULT_KOP); setKop(DEFAULT_KOP); }
                    }, (err) => console.log("Silent fallback on snapshot."));

                    const infoRef = doc(db, 'artifacts', appId, 'public', 'data', 'configs', 'info');
                    onSnapshot(infoRef, (docSnap) => {
                        if (docSnap.exists()) setAppInfo(docSnap.data());
                        else {
                            const defaultInfo = { version: 'v1.0.0-Cloud', creator: 'Developer SMK Negeri 3 Selayar', theme: 'indigo', gasUrl: '' };
                            setDoc(infoRef, defaultInfo); setAppInfo(defaultInfo);
                        }
                    }, (err) => console.log("Silent fallback on snapshot."));

                    const studentsRef = collection(db, 'artifacts', appId, 'public', 'data', 'students');
                    onSnapshot(studentsRef, (snapshot) => {
                        if (snapshot.empty) {
                            autoSetupDatabase(db);
                        } else {
                            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            data.sort((a, b) => a.kelas.localeCompare(b.kelas) || a.nama.localeCompare(b.nama));
                            setStudents(data);
                        }
                    }, (err) => console.log("Sync Error"));

                    const journalsRef = collection(db, 'artifacts', appId, 'public', 'data', 'journals');
                    onSnapshot(journalsRef, (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        data.sort((a, b) => b.tanggal.localeCompare(a.tanggal));
                        setJournals(data);
                    }, (err) => console.log("Sync Error"));

                    const gurusRef = collection(db, 'artifacts', appId, 'public', 'data', 'gurus');
                    onSnapshot(gurusRef, (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setGurus(data);
                    }, (err) => console.log("Sync Error"));

                    const classesRef = collection(db, 'artifacts', appId, 'public', 'data', 'classes');
                    onSnapshot(classesRef, (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        data.sort((a, b) => a.nama.localeCompare(b.nama));
                        setClasses(data);
                    }, (err) => console.log("Sync Error"));

                    const subjectsRef = collection(db, 'artifacts', appId, 'public', 'data', 'subjects');
                    onSnapshot(subjectsRef, (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        data.sort((a, b) => a.nama.localeCompare(b.nama));
                        setSubjects(data);
                    }, (err) => console.log("Sync Error"));

                    setLoading(false);
                } catch (error) {
                    console.error("Gagal terhubung ke Cloud. Menggunakan basis data lokal...", error);
                    setupLocalStorageConnection();
                }
            };

            const setupLocalStorageConnection = () => {
                setFirebaseActive(false);
                
                if (!safeStorage.getItem('jurnal_kop')) safeStorage.setItem('jurnal_kop', JSON.stringify(DEFAULT_KOP));
                if (!safeStorage.getItem('jurnal_app_info')) safeStorage.setItem('jurnal_app_info', JSON.stringify({ version: 'v1.0.0-Cloud', creator: 'Developer SMK', theme: 'indigo', gasUrl: '' }));
                if (!safeStorage.getItem('jurnal_students')) safeStorage.setItem('jurnal_students', JSON.stringify(DUMMY_STUDENTS));
                if (!safeStorage.getItem('jurnal_journals')) safeStorage.setItem('jurnal_journals', JSON.stringify([]));
                if (!safeStorage.getItem('jurnal_gurus')) safeStorage.setItem('jurnal_gurus', JSON.stringify(DUMMY_USERS));
                if (!safeStorage.getItem('jurnal_classes')) safeStorage.setItem('jurnal_classes', JSON.stringify([{ id: "c1", nama: "XI-A" }, { id: "c2", nama: "XI-B" }]));
                if (!safeStorage.getItem('jurnal_subjects')) safeStorage.setItem('jurnal_subjects', JSON.stringify([{ id: "sub1", nama: "Matematika" }, { id: "sub2", nama: "Fisika" }]));

                setKop(JSON.parse(safeStorage.getItem('jurnal_kop')));
                setAppInfo(JSON.parse(safeStorage.getItem('jurnal_app_info')));
                setStudents(JSON.parse(safeStorage.getItem('jurnal_students')));
                setJournals(JSON.parse(safeStorage.getItem('jurnal_journals')));
                setGurus(JSON.parse(safeStorage.getItem('jurnal_gurus')));
                setClasses(JSON.parse(safeStorage.getItem('jurnal_classes')));
                setSubjects(JSON.parse(safeStorage.getItem('jurnal_subjects')));
                setLoading(false);
            };

            const autoSetupDatabase = async (db) => {
                const { collection, addDoc, doc, setDoc } = window.firebaseFirestoreSDK;
                const kopRef = doc(db, 'artifacts', appId, 'public', 'data', 'configs', 'kop');
                const infoRef = doc(db, 'artifacts', appId, 'public', 'data', 'configs', 'info');
                await setDoc(kopRef, DEFAULT_KOP);
                await setDoc(infoRef, { version: 'v1.0.0-Cloud', creator: 'Developer SMK Negeri 3 Selayar', theme: 'indigo', gasUrl: '' });

                const studentsRef = collection(db, 'artifacts', appId, 'public', 'data', 'students');
                for (const student of DUMMY_STUDENTS) {
                    await addDoc(studentsRef, { nis: student.nis, nama: student.nama, kelas: student.kelas });
                }
                const gurusRef = collection(db, 'artifacts', appId, 'public', 'data', 'gurus');
                for (const gr of DUMMY_USERS) {
                    await addDoc(gurusRef, { nip: gr.nip, nama: gr.nama, password: gr.password, role: gr.role, mapel: gr.mapel });
                }
                const classesRef = collection(db, 'artifacts', appId, 'public', 'data', 'classes');
                await addDoc(classesRef, { nama: "XI-A" });
                await addDoc(classesRef, { nama: "XI-B" });

                const subjectsRef = collection(db, 'artifacts', appId, 'public', 'data', 'subjects');
                await addDoc(subjectsRef, { nama: "Matematika" });
                await addDoc(subjectsRef, { nama: "Fisika" });
            };

            const handleLoginSuccess = (userData) => {
                setLoggedInUser(userData);
                safeStorage.setItem('jurnal_active_user', JSON.stringify(userData));
                setCurrentView('dashboard');
            };

            const handleLogout = () => {
                triggerConfirm(
                    "Keluar Aplikasi",
                    "Apakah Anda yakin ingin mengakhiri sesi dan keluar?",
                    () => {
                        setLoggedInUser(null);
                        safeStorage.removeItem('jurnal_active_user');
                    }
                );
            };

            const updateKop = async (newKop) => {
                if (firebaseActive) {
                    const { doc, setDoc } = window.firebaseFirestoreSDK;
                    await setDoc(doc(window.activeDb, 'artifacts', appId, 'public', 'data', 'configs', 'kop'), newKop);
                } else {
                    safeStorage.setItem('jurnal_kop', JSON.stringify(newKop)); setKop(newKop);
                }
            };

            const updateAppInfo = async (newInfo) => {
                if (firebaseActive) {
                    const { doc, setDoc } = window.firebaseFirestoreSDK;
                    await setDoc(doc(window.activeDb, 'artifacts', appId, 'public', 'data', 'configs', 'info'), newInfo);
                } else {
                    safeStorage.setItem('jurnal_app_info', JSON.stringify(newInfo)); setAppInfo(newInfo);
                }
            };

            const addStudent = async (newStudent) => {
                if (firebaseActive) {
                    const { collection, addDoc } = window.firebaseFirestoreSDK;
                    await addDoc(collection(window.activeDb, 'artifacts', appId, 'public', 'data', 'students'), newStudent);
                } else {
                    const updated = [...students, { id: 'local_' + Date.now(), ...newStudent }];
                    safeStorage.setItem('jurnal_students', JSON.stringify(updated)); setStudents(updated);
                }
            };

            const updateStudent = async (id, updatedStudent) => {
                if (firebaseActive) {
                    const { doc, updateDoc } = window.firebaseFirestoreSDK;
                    await updateDoc(doc(window.activeDb, 'artifacts', appId, 'public', 'data', 'students', id), updatedStudent);
                } else {
                    const updated = students.map(s => s.id === id ? { ...s, ...updatedStudent } : s);
                    safeStorage.setItem('jurnal_students', JSON.stringify(updated)); setStudents(updated);
                }
            };

            const addStudentsBulk = async (studentList) => {
                if (firebaseActive) {
                    const { collection, addDoc } = window.firebaseFirestoreSDK;
                    const ref = collection(window.activeDb, 'artifacts', appId, 'public', 'data', 'students');
                    for (const student of studentList) {
                        await addDoc(ref, student);
                    }
                } else {
                    const localWithIds = studentList.map((s, idx) => ({ id: 'local_bulk_' + Date.now() + '_' + idx, ...s }));
                    const updated = [...students, ...localWithIds];
                    safeStorage.setItem('jurnal_students', JSON.stringify(updated)); setStudents(updated);
                }
            };

            const deleteStudent = async (id) => {
                if (firebaseActive) {
                    const { doc, deleteDoc } = window.firebaseFirestoreSDK;
                    await deleteDoc(doc(window.activeDb, 'artifacts', appId, 'public', 'data', 'students', id));
                } else {
                    const updated = students.filter(s => s.id !== id);
                    safeStorage.setItem('jurnal_students', JSON.stringify(updated)); setStudents(updated);
                }
            };

            const deleteStudentsBulk = async (ids) => {
                if (firebaseActive) {
                    const { doc, deleteDoc } = window.firebaseFirestoreSDK;
                    for (const id of ids) {
                        await deleteDoc(doc(window.activeDb, 'artifacts', appId, 'public', 'data', 'students', id));
                    }
                } else {
                    const updated = students.filter(s => !ids.includes(s.id));
                    safeStorage.setItem('jurnal_students', JSON.stringify(updated)); setStudents(updated);
                }
            };

            const addJournal = async (newJournal) => {
                const payload = { ...newJournal, guru_nama: loggedInUser.nama, guru_nip: loggedInUser.nip };
                if (firebaseActive) {
                    const { collection, addDoc } = window.firebaseFirestoreSDK;
                    await addDoc(collection(window.activeDb, 'artifacts', appId, 'public', 'data', 'journals'), payload);
                } else {
                    const updated = [{ id: 'j_local_' + Date.now(), ...payload }, ...journals];
                    safeStorage.setItem('jurnal_journals', JSON.stringify(updated)); setJournals(updated);
                }
            };

            const deleteJournal = async (id) => {
                if (firebaseActive) {
                    const { doc, deleteDoc } = window.firebaseFirestoreSDK;
                    await deleteDoc(doc(window.activeDb, 'artifacts', appId, 'public', 'data', 'journals', id));
                } else {
                    const updated = journals.filter(j => j.id !== id);
                    safeStorage.setItem('jurnal_journals', JSON.stringify(updated)); setJournals(updated);
                }
            };

            const updateJournal = async (id, updatedJournal) => {
                if (firebaseActive) {
                    const { doc, updateDoc } = window.firebaseFirestoreSDK;
                    await updateDoc(doc(window.activeDb, 'artifacts', appId, 'public', 'data', 'journals', id), updatedJournal);
                } else {
                    const updated = journals.map(j => j.id === id ? { ...j, ...updatedJournal } : j);
                    safeStorage.setItem('jurnal_journals', JSON.stringify(updated)); setJournals(updated);
                }
            };

            const addGuru = async (newGuru) => {
                if (firebaseActive) {
                    const { collection, addDoc } = window.firebaseFirestoreSDK;
                    await addDoc(collection(window.activeDb, 'artifacts', appId, 'public', 'data', 'gurus'), newGuru);
                } else {
                    const updated = [...gurus, { id: 'g_local_' + Date.now(), ...newGuru }];
                    safeStorage.setItem('jurnal_gurus', JSON.stringify(updated)); setGurus(updated);
                }
            };

            const updateGuru = async (id, updatedGuru) => {
                if (firebaseActive) {
                    const { doc, updateDoc } = window.firebaseFirestoreSDK;
                    await updateDoc(doc(window.activeDb, 'artifacts', appId, 'public', 'data', 'gurus', id), updatedGuru);
                } else {
                    const updated = gurus.map(g => g.id === id ? { ...g, ...updatedGuru } : g);
                    safeStorage.setItem('jurnal_gurus', JSON.stringify(updated)); setGurus(updated);
                }
            };

            const deleteGuru = async (id) => {
                if (firebaseActive) {
                    const { doc, deleteDoc } = window.firebaseFirestoreSDK;
                    await deleteDoc(doc(window.activeDb, 'artifacts', appId, 'public', 'data', 'gurus', id));
                } else {
                    const updated = gurus.filter(g => g.id !== id);
                    safeStorage.setItem('jurnal_gurus', JSON.stringify(updated)); setGurus(updated);
                }
            };

            const addClass = async (newClass) => {
                if (firebaseActive) {
                    const { collection, addDoc } = window.firebaseFirestoreSDK;
                    await addDoc(collection(window.activeDb, 'artifacts', appId, 'public', 'data', 'classes'), newClass);
                } else {
                    const updated = [...classes, { id: 'class_' + Date.now(), ...newClass }];
                    safeStorage.setItem('jurnal_classes', JSON.stringify(updated)); setClasses(updated);
                }
            };

            const deleteClass = async (id) => {
                if (firebaseActive) {
                    const { doc, deleteDoc } = window.firebaseFirestoreSDK;
                    await deleteDoc(doc(window.activeDb, 'artifacts', appId, 'public', 'data', 'classes', id));
                } else {
                    const updated = classes.filter(c => c.id !== id);
                    safeStorage.setItem('jurnal_classes', JSON.stringify(updated)); setClasses(updated);
                }
            };

            const addSubject = async (newSub) => {
                if (firebaseActive) {
                    const { collection, addDoc } = window.firebaseFirestoreSDK;
                    await addDoc(collection(window.activeDb, 'artifacts', appId, 'public', 'data', 'subjects'), newSub);
                } else {
                    const updated = [...subjects, { id: 'sub_' + Date.now(), ...newSub }];
                    safeStorage.setItem('jurnal_subjects', JSON.stringify(updated)); setSubjects(updated);
                }
            };

            const deleteSubject = async (id) => {
                if (firebaseActive) {
                    const { doc, deleteDoc } = window.firebaseFirestoreSDK;
                    await deleteDoc(doc(window.activeDb, 'artifacts', appId, 'public', 'data', 'subjects', id));
                } else {
                    const updated = subjects.filter(s => s.id !== id);
                    safeStorage.setItem('jurnal_subjects', JSON.stringify(updated)); setSubjects(updated);
                }
            };

            if (loading) {
                return (
                    <div className="flex flex-col h-screen items-center justify-center bg-slate-950 text-white space-y-4">
                        <div className="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                        <p className="text-lg font-semibold tracking-wider">Menghubungkan Server Cloud (Cara Ke-2)...</p>
                    </div>
                );
            }

            if (!loggedInUser) {
                return <ViewLogin onLoginSuccess={handleLoginSuccess} firebaseActive={firebaseActive} appInfo={appInfo} />;
            }

            const isKepsek = loggedInUser.role === 'kepsek';
            const isAdmin = loggedInUser.role === 'admin';

            return (
                <div className="flex h-screen overflow-hidden font-sans">
                    <CustomConfirmModal isOpen={confirmState.isOpen} title={confirmState.title} message={confirmState.message} onConfirm={confirmState.onConfirm} onCancel={() => setConfirmState({ isOpen: false })} />
                    <CustomAlertModal isOpen={alertState.isOpen} title={alertState.title} message={alertState.message} onClose={() => setAlertState({ isOpen: false })} />

                    <aside className={`hidden md:flex bg-slate-900 text-white flex-col shadow-2xl print-hidden flex-shrink-0 z-30 transition-all duration-300 ${isSidebarOpen ? 'w-72' : 'w-0 overflow-hidden'}`}>
                        <div className="w-72 flex flex-col h-full">
                            <div className="p-8 border-b border-indigo-950 flex items-center space-x-3">
                                <div className="p-2.5 bg-indigo-600 rounded-2xl">
                                    <IconBook />
                                </div>
                                <div>
                                    <h1 className="text-lg font-black tracking-tight leading-none text-white">E-JURNAL</h1>
                                    <span className="text-indigo-400 text-[10px] font-bold tracking-widest uppercase">
                                        {isAdmin ? 'ADMINISTRATOR' : isKepsek ? 'KEPALA SEKOLAH' : 'GURU TERPADU'}
                                    </span>
                                </div>
                            </div>

                            <nav className="flex-1 px-4 py-8 space-y-1.5 overflow-y-auto">
                                {isAdmin ? (
                                    <>
                                        <MenuButton icon={<IconDashboard />} label="Dashboard Cloud" isActive={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
                                        <MenuButton icon={<IconUsers />} label="Akun Guru Cloud" isActive={currentView === 'kelola_guru'} onClick={() => setCurrentView('kelola_guru')} />
                                        <MenuButton icon={<IconBook />} label="Koleksi Referensi" isActive={currentView === 'kelola_referensi'} onClick={() => setCurrentView('kelola_referensi')} />
                                        <MenuButton icon={<IconPrint />} label="Pengaturan Kop" isActive={currentView === 'kelola_kop'} onClick={() => setCurrentView('kelola_kop')} />
                                        <MenuButton icon={<IconInfo />} label="Identitas Versi &amp; Drive" isActive={currentView === 'kelola_info'} onClick={() => setCurrentView('kelola_info')} />
                                        <MenuButton icon={<IconLock />} label="Akun Kepsek" isActive={currentView === 'kelola_kepsek'} onClick={() => setCurrentView('kelola_kepsek')} />
                                    </>
                                ) : isKepsek ? (
                                    <>
                                        <MenuButton icon={<IconDashboard />} label="Dashboard Kepsek" isActive={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
                                        <MenuButton icon={<IconHistory />} label="Monitoring Guru" isActive={currentView === 'monitoring_jurnal'} onClick={() => setCurrentView('monitoring_jurnal')} />
                                        <MenuButton icon={<IconChart />} label="Rekap Kelas" isActive={currentView === 'rekap'} onClick={() => setCurrentView('rekap')} />
                                    </>
                                ) : (
                                    <>
                                        <MenuButton icon={<IconDashboard />} label="Dashboard" isActive={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
                                        <MenuButton icon={<IconUsers />} label="Data Siswa Cloud" isActive={currentView === 'siswa'} onClick={() => setCurrentView('siswa')} />
                                        <MenuButton icon={<IconBook />} label="Isi Jurnal Mengajar" isActive={currentView === 'isi_jurnal'} onClick={() => setCurrentView('isi_jurnal')} />
                                        <MenuButton icon={<IconHistory />} label="Riwayat Jurnal" isActive={currentView === 'riwayat'} onClick={() => setCurrentView('riwayat')} />
                                        <MenuButton icon={<IconChart />} label="Rekap Laporan" isActive={currentView === 'rekap'} onClick={() => setCurrentView('rekap')} />
                                    </>
                                )}
                            </nav>

                            <div className="p-6 border-t border-indigo-950/80 bg-slate-950/40">
                                <div className="flex items-center space-x-3 mb-4">
                                    <div className="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center font-bold text-white uppercase shadow-lg">
                                        {loggedInUser.nama.charAt(0)}
                                    </div>
                                    <div className="flex-1 overflow-hidden">
                                        <p className="text-sm font-semibold truncate text-white leading-tight">{loggedInUser.nama}</p>
                                        <p className="text-[10px] text-slate-400 font-mono mt-0.5">Role: {loggedInUser.role.toUpperCase()}</p>
                                    </div>
                                </div>
                                <button onClick={handleLogout} className="w-full bg-rose-500/10 hover:bg-rose-50 hover:text-white border border-rose-500/20 text-rose-400 text-xs font-bold py-2.5 rounded-xl transition flex items-center justify-center space-x-2">
                                    <span>Log out</span>
                                </button>
                            </div>
                        </div>
                    </aside>

                    <nav className="md:hidden fixed bottom-4 left-4 right-4 bg-slate-900/95 backdrop-blur-md rounded-2xl p-2.5 flex items-center justify-around shadow-2xl print-hidden z-40 border border-white/10">
                        <MobileTabButton icon={<IconDashboard />} isActive={currentView === 'dashboard'} onClick={() => setCurrentView('dashboard')} />
                        {!isAdmin && !isKepsek && (
                            <>
                                <MobileTabButton icon={<IconUsers />} isActive={currentView === 'siswa'} onClick={() => setCurrentView('siswa')} />
                                <MobileTabButton icon={<IconBook />} isActive={currentView === 'isi_jurnal'} onClick={() => setCurrentView('isi_jurnal')} />
                            </>
                        )}
                        <button onClick={handleLogout} className="p-3 text-rose-400">✕</button>
                    </nav>

                    <main className="flex-1 flex flex-col h-screen overflow-y-auto print-block bg-slate-50 relative">
                        <header className="bg-white/85 backdrop-blur-md border-b px-8 py-5 flex items-center justify-between print-hidden sticky top-0 z-20">
                            <div className="flex items-center space-x-4">
                                <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="hidden md:flex p-2 hover:bg-slate-100 rounded-xl text-slate-600">
                                    ☰
                                </button>
                                <h2 className="text-xl font-bold text-slate-800 capitalize tracking-tight flex items-center space-x-2">
                                    <span className="text-indigo-600">|</span>
                                    <span>{currentView.replace('_', ' ')}</span>
                                </h2>
                            </div>
                            <div className="text-xs font-semibold text-slate-600 bg-slate-100 py-1.5 px-4 rounded-full border">
                                <span className="w-2 h-2 inline-block rounded-full bg-emerald-500 mr-1.5 animate-pulse"></span>
                                Cloud Database Sync (Cara Ke-2)
                            </div>
                        </header>

                        <div className="p-4 md:p-8 flex-1 pb-24 md:pb-8">
                            {isAdmin ? (
                                <>
                                    {currentView === 'dashboard' && <ViewDashboardAdmin gurus={gurus} students={students} journals={journals} />}
                                    {currentView === 'kelola_guru' && <ViewKelolaGuru gurus={gurus} subjects={subjects} addGuru={addGuru} updateGuru={updateGuru} deleteGuru={deleteGuru} triggerAlert={triggerAlert} />}
                                    {currentView === 'kelola_referensi' && <ViewKelolaReferensi classes={classes} subjects={subjects} addClass={addClass} deleteClass={deleteClass} addSubject={addSubject} deleteSubject={deleteSubject} triggerAlert={triggerAlert} />}
                                    {currentView === 'kelola_kop' && <ViewKelolaKop kop={kop} updateKop={updateKop} triggerAlert={triggerAlert} />}
                                    {currentView === 'kelola_info' && <ViewKelolaInfo appInfo={appInfo} updateAppInfo={updateAppInfo} triggerAlert={triggerAlert} />}
                                    {currentView === 'kelola_kepsek' && <ViewKelolaKepsek gurus={gurus} updateGuru={updateGuru} triggerAlert={triggerAlert} />}
                                </>
                            ) : isKepsek ? (
                                <>
                                    {currentView === 'dashboard' && <ViewDashboardKepsek journals={journals} students={students} changeView={setCurrentView} />}
                                    {currentView === 'monitoring_jurnal' && <ViewMonitoringJurnal journals={journals} deleteJournal={deleteJournal} kop={kop} />}
                                    {currentView === 'rekap' && <ViewRekap journals={journals} students={students} kop={kop} />}
                                </>
                            ) : (
                                <>
                                    {currentView === 'dashboard' && <ViewDashboard journals={journals} students={students} changeView={setCurrentView} />}
                                    {currentView === 'siswa' && <ViewDataSiswa students={students} classes={classes} addStudent={addStudent} updateStudent={updateStudent} addStudentsBulk={addStudentsBulk} deleteStudent={deleteStudent} deleteStudentsBulk={deleteStudentsBulk} triggerAlert={triggerAlert} triggerConfirm={triggerConfirm} />}
                                    {currentView === 'isi_jurnal' && <ViewIsiJurnal students={students} classes={classes} subjects={subjects} addJournal={addJournal} onSuccess={() => setCurrentView('riwayat')} triggerAlert={triggerAlert} appInfo={appInfo} />}
                                    {currentView === 'riwayat' && <ViewRiwayat journals={journals} deleteJournal={deleteJournal} updateJournal={updateJournal} kop={kop} />}
                                    {currentView === 'rekap' && <ViewRekap journals={journals} students={students} kop={kop} />}
                                </>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const MenuButton = ({ icon, label, isActive, onClick }) => (
            <button onClick={onClick} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all ${isActive ? 'bg-indigo-600 text-white shadow-lg font-semibold translate-x-1' : 'text-indigo-200/80 hover:bg-slate-800'}`}>
                <span>{icon}</span>
                <span className="text-sm tracking-wide">{label}</span>
            </button>
        );

        const MobileTabButton = ({ icon, isActive, onClick }) => (
            <button onClick={onClick} className={`p-3 rounded-xl ${isActive ? 'bg-indigo-600 text-white shadow-lg' : 'text-indigo-300'}`}>
                {icon}
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
